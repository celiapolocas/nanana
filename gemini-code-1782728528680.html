<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>nanana</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root {
  --bg: #FAFAF8;
  --white: #FFFFFF;
  --text: #1a1a1a;
  --muted: #8a8a8a;
  --border: #E8E8E8;
  --surface: #F2F2F0;
  --red: #E8000D;
  --red-light: #FFF0F0;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --r: 12px;
  --font: 'Inter', -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: 140px; -webkit-font-smoothing: antialiased; }

/* ── HEADER & NAV ─────────────────────────────────────────── */
header { position: sticky; top: 0; z-index: 100; background: rgba(250,250,248,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 12px 16px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo { font-size: 22px; font-weight: 800; color: var(--red); line-height: 1; letter-spacing: -1.5px; }
.logo-sub { font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px;}
.icon-btn { background: var(--surface); border: none; border-radius: 9px; color: var(--muted); padding: 8px; cursor: pointer; display: flex; align-items: center;}
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none;}
#buscar { width: 100%; background: var(--surface); border: 1.5px solid transparent; border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 12px 10px 34px; outline: none; font-family: var(--font); transition: border-color .2s, background .2s;}
#buscar:focus { border-color: var(--red); background: var(--white); }

/* ── CONFIG ─────────────────────────────────────────── */
#config-panel { display: none; background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; margin-bottom: 10px; }
#config-panel.visible { display: block; }
.config-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
#api-url { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; padding: 8px 10px; outline: none; margin-bottom: 8px; font-family: var(--font); }
#api-url:focus { border-color: var(--red); }
.btn-config-save { width: 100%; background: var(--red); border: none; border-radius: 8px; color: white; font-size: 13px; font-weight: 700; padding: 9px; cursor: pointer; font-family: var(--font); }

.nav-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
.nav-tab { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 13px; font-weight: 600; padding: 14px 4px; cursor: pointer; transition: color .2s; }
.nav-tab.activo { color: var(--red); border-bottom-color: var(--red); }

/* ── GRUPOS FECHA (PROGRAMA) ─────────────────────────────────────────── */
.grupo-fecha { margin-bottom: 6px; }
.fecha-header { padding: 14px 16px; background: var(--bg); font-weight: 800; font-size: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 115px; z-index: 90; letter-spacing: -0.5px;}
.chevron { transition: transform 0.2s; color: var(--muted); }
.grupo-fecha.colapsado .chevron { transform: rotate(-90deg); }
.grupo-fecha.colapsado .lista-canciones { display: none; }
.lista-canciones { padding-top: 6px; }

/* ── CARDS (Canciones) ────────────────────────────────────── */
.cancion { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r); margin: 6px 12px; padding: 12px; display: flex; align-items: center; gap: 12px; transition: border-color .15s;}
.cancion.guardada { border-color: var(--green); background: var(--green-light); }
.cancion-info { flex: 1; min-width: 0; }
.titulo { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;}
.artista { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500;}
.meta-txt { font-size: 10px; color: var(--red); margin-top: 2px; font-weight: 500;}
.acciones { display: flex; gap: 6px; }
.btn-play { width: 36px; height: 36px; border-radius: 50%; background: var(--red); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-heart { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: 1.5px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-heart.guardado { color: var(--green); border-color: #86efac; }

/* ── REPRODUCTOR FOOTER & PANTALLA COMPLETA ────────────────────────── */
#mini-player { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: rgba(250,250,248,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); display: none; cursor: pointer; }
#mini-player.visible { display: block; }
.mp-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.mp-info { flex: 1; min-width: 0; }
.mp-titulo { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mp-artista { font-size: 12px; color: var(--muted); font-weight: 500;}
.mp-controls { display: flex; align-items: center; gap: 12px; }
.ctrl-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--surface); border: none; color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; }
.ctrl-btn.main { background: var(--red); width: 46px; height: 46px; color: white;}

/* Barra de progreso y tiempos */
.progress-container { display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; }
.progress-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--red); width: 0%; transition: width 0.1s linear; }

#full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 300; transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); }
#full-player.open { top: 0; }
.fp-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
.btn-close-fp { background: none; border: none; color: var(--text); font-size: 16px; cursor: pointer; font-weight: 700; font-family: var(--font);}
.fp-cover { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 16px; background: var(--surface); margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border);}
.fp-metadata { text-align: center; margin-bottom: 24px; }
.fp-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; color: var(--text);}
.fp-artist { font-size: 16px; color: var(--muted); margin-bottom: 8px; font-weight: 500;}
.fp-album { font-size: 12px; color: var(--red); font-weight: 600;}
.fp-lyrics { flex: 1; overflow-y: auto; background: var(--surface); border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.6; color: var(--text); text-align: center; margin-top:10px; border: 1px solid var(--border);}

/* ── UTILIDADES ─────────────────────────────────────────── */
.estado { text-align: center; padding: 50px 24px; color: var(--muted); }
.estado h2 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -0.3px; }
.estado p { font-size: 13px; line-height: 1.6; max-width: 260px; margin: 0 auto; font-weight: 500; }
.spinner { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
#yt-player-container { position: absolute; width: 1px; height: 1px; top: -9999px; left: -9999px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="logo">nanana</div>
      <div class="logo-sub">Radio 3 · playlist diaria</div>
    </div>
    <button class="icon-btn" onclick="toggleConfig()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
  <div id="config-panel">
    <div class="config-label">URL del Google Apps Script</div>
    <input id="api-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">
    <button class="btn-config-save" onclick="guardarConfig()">Guardar y conectar</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="buscar" type="search" placeholder="Artista, canción, año de lanzamiento…">
  </div>
</header>

<div class="nav-tabs">
  <button class="nav-tab activo" onclick="setTab('programa',this)">Programa</button>
  <button class="nav-tab" onclick="setTab('canciones',this)">Canciones</button>
  <button class="nav-tab" onclick="setTab('guardadas',this)">Guardadas</button>
</div>

<main id="main"></main>

<!-- Reproductor Footer -->
<div id="mini-player" onclick="abrirFullPlayer(event)">
  <div class="mp-top">
    <div class="mp-info">
      <div class="mp-titulo" id="mp-titulo">—</div>
      <div class="mp-artista" id="mp-artista">—</div>
    </div>
    <div class="mp-controls">
      <button class="btn-heart" id="mp-heart" onclick="toggleGuardarActual(event)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
      <button class="ctrl-btn main" onclick="togglePlayPause(event)"><svg id="mp-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
    </div>
  </div>
  <div class="progress-container">
    <span id="mp-time-current">0:00</span>
    <div class="progress-bar"><div class="progress-fill" id="mp-progress"></div></div>
    <span id="mp-time-total">0:00</span>
  </div>
</div>

<!-- Reproductor Pantalla Completa -->
<div id="full-player">
  <div class="fp-header">
    <button class="btn-close-fp" onclick="cerrarFullPlayer()">▼ Minimizar</button>
  </div>
  <img id="fp-cover" class="fp-cover" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
  <div class="fp-metadata">
    <div class="fp-title" id="fp-title">—</div>
    <div class="fp-artist" id="fp-artist">—</div>
    <div class="fp-album" id="fp-album">—</div>
  </div>
  
  <div class="progress-container" style="margin-bottom: 20px;">
    <span id="fp-time-current">0:00</span>
    <div class="progress-bar"><div class="progress-fill" id="fp-progress"></div></div>
    <span id="fp-time-total">0:00</span>
  </div>

  <div class="fp-lyrics" id="fp-lyrics">Cargando letras...</div>
</div>

<div id="yt-player-container"><div id="yt-player"></div></div>

<script>
// CLAVES Y CONFIGURACIÓN
const YT_API_KEY = 'AIzaSyA7zQHywXxMH6wXxne0D7FfaWeOgXcZcTI';
const LASTFM_API_KEY = '196f73e700628c03e1c2f4b9d8b26c25';
const CONFIG_KEY = 'nanana_api_url';

let datos = {}, guardadas = {}, metaCache = {};
let tabActivo = 'programa', busquedaActiva = '';
let cola = [], colaIndex = -1, isPaused = false;
let ytPlayer, progressInterval;

// INICIALIZACIÓN Y CONFIG
window.onload = () => {
  try{ guardadas = JSON.parse(localStorage.getItem('guardadas')||'{}'); }catch{}
  try{ metaCache = JSON.parse(localStorage.getItem('meta')||'{}'); }catch{}
  cargarDatos();
};

function getApiUrl(){ return localStorage.getItem(CONFIG_KEY)||''; }

function toggleConfig(){
  const p=document.getElementById('config-panel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible')) document.getElementById('api-url').value=getApiUrl();
}

function guardarConfig(){
  localStorage.setItem(CONFIG_KEY,document.getElementById('api-url').value.trim());
  toggleConfig(); 
  cargarDatos();
}

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    height: '1', width: '1', videoId: '',
    playerVars: { 'autoplay': 1, 'controls': 0 },
    events: { 'onStateChange': onPlayerStateChange }
  });
}

// FORMATOS DE TIEMPO Y FECHA
function formatearTiempo(segundos) {
  if(!segundos || isNaN(segundos)) return "0:00";
  const m = Math.floor(segundos / 60);
  const s = Math.floor(segundos % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function formatearFechaEspanol(iso) {
  if(!iso) return '';
  const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
  const partes = iso.split('-');
  if(partes.length !== 3) return iso;
  return `${parseInt(partes[2])} ${meses[parseInt(partes[1])-1]} ${partes[0]}`;
}

// CONTROL DEL REPRODUCTOR
function onPlayerStateChange(event) {
  if(event.data === YT.PlayerState.ENDED) nextCancion();
  if(event.data === YT.PlayerState.PLAYING) {
    isPaused = false; actualizarIconoPlay();
    progressInterval = setInterval(actualizarProgreso, 500);
  }
  if(event.data === YT.PlayerState.PAUSED) {
    isPaused = true; actualizarIconoPlay();
    clearInterval(progressInterval);
  }
}

function actualizarProgreso() {
  if(ytPlayer && ytPlayer.getDuration) {
    const duration = ytPlayer.getDuration();
    const current = ytPlayer.getCurrentTime();
    if(duration > 0) {
      const porcentaje = ((current / duration) * 100) + '%';
      const tActual = formatearTiempo(current);
      const tTotal = formatearTiempo(duration);
      
      // Mini Player
      document.getElementById('mp-progress').style.width = porcentaje;
      document.getElementById('mp-time-current').textContent = tActual;
      document.getElementById('mp-time-total').textContent = tTotal;
      
      // Full Player
      document.getElementById('fp-progress').style.width = porcentaje;
      document.getElementById('fp-time-current').textContent = tActual;
      document.getElementById('fp-time-total').textContent = tTotal;
    }
  }
}

async function cargarDatos(){
  const apiUrl = getApiUrl();
  const main = document.getElementById('main');
  
  if(!apiUrl){
    main.innerHTML=`<div class="estado"><h2>Conecta tu script</h2><p>Toca el icono de la tuerca arriba a la derecha y pega la URL de tu Google Apps Script.</p></div>`;
    return;
  }

  main.innerHTML=`<div class="estado"><div class="spinner"></div></div>`;
  try{
    const resp=await fetch(apiUrl);
    const json=await resp.json();
    datos=json.datos||{};
    renderizar();
  }catch{
    main.innerHTML=`<div class="estado"><h2>Error de conexión</h2><p>No se han podido cargar los datos. Revisa la URL de tu script.</p></div>`;
  }
}

// RENDERIZADO DE LA UI
function setTab(tab,btn){
  tabActivo=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('activo'));
  btn.classList.add('activo');
  renderizar();
}

document.getElementById('buscar').addEventListener('input',e=>{ busquedaActiva=e.target.value.trim(); renderizar(); });

function toggleGrupo(id) {
  document.getElementById(id).classList.toggle('colapsado');
}

function renderizar(){
  const main=document.getElementById('main');
  const q=busquedaActiva.toLowerCase();
  const isYearSearch = /^\d{4}$/.test(q); 
  
  let html = '';
  cola = []; 

  if (tabActivo === 'programa') {
    const fechas = Object.keys(datos).sort((a,b)=>b.localeCompare(a));
    const fechaMasReciente = fechas[0];

    fechas.forEach(fecha => {
      let canciones = datos[fecha];
      
      if(q) {
        canciones = canciones.filter(c => {
          let k = c.artista+'||'+c.titulo;
          let meta = metaCache[k];
          if(isYearSearch) return (meta?.date||'').includes(q);
          return c.artista.toLowerCase().includes(q) || c.titulo.toLowerCase().includes(q) || (meta?.album||'').toLowerCase().includes(q);
        });
      }

      if(canciones.length === 0) return;

      const esDesplegado = (fecha === fechaMasReciente) && !q;
      const colapsadoClass = esDesplegado ? '' : 'colapsado';
      
      html += `<div class="grupo-fecha ${colapsadoClass}" id="grupo-${fecha}">
        <div class="fecha-header" onclick="toggleGrupo('grupo-${fecha}')">
          <span>${formatearFechaEspanol(fecha)}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="lista-canciones">`;
      
      canciones.forEach(c => {
        let k = c.artista+'||'+c.titulo;
        if(!metaCache[k]) cargarMetaLastFM(c.artista, c.titulo);
        c.meta = metaCache[k];
        cola.push(c);
        html += generarCardCancion(c, cola.length - 1);
      });

      html += `</div></div>`;
    });

  } else {
    let listaFiltro = [];
    Object.keys(datos).forEach(fecha=>{
      datos[fecha].forEach(c=>{
        let k = c.artista+'||'+c.titulo;
        if(!metaCache[k]) cargarMetaLastFM(c.artista, c.titulo);
        listaFiltro.push({...c, meta: metaCache[k]});
      });
    });

    if(tabActivo==='guardadas') {
      listaFiltro = listaFiltro.filter(c=> guardadas[c.artista+'||'+c.titulo]);
    } else if (tabActivo==='canciones') {
      const vistas = new Set();
      listaFiltro = listaFiltro.filter(c => { const k=c.artista+'||'+c.titulo; if(vistas.has(k))return false; vistas.add(k); return true; });
    }

    if(q) {
      listaFiltro = listaFiltro.filter(c=>{
        if(isYearSearch) return (c.meta?.date||'').includes(q);
        return c.artista.toLowerCase().includes(q) || c.titulo.toLowerCase().includes(q) || (c.meta?.album||'').toLowerCase().includes(q);
      });
    }

    cola = listaFiltro;
    listaFiltro.forEach((c, i) => {
      html += generarCardCancion(c, i);
    });
  }

  main.innerHTML = html || `<div class="estado"><h2>Sin resultados</h2><p>No hay canciones que mostrar.</p></div>`;
}

function generarCardCancion(c, i) {
  const k = c.artista+'||'+c.titulo;
  const esGuardada = guardadas[k];
  const infoMeta = c.meta ? `${c.meta.album} ${c.meta.date ? '· '+c.meta.date : ''}` : '';
  
  return `<div class="cancion ${esGuardada?'guardada':''}">
    <div class="cancion-info">
      <div class="titulo">${c.titulo}</div>
      <div class="artista">${c.artista}</div>
      ${infoMeta ? `<div class="meta-txt">${infoMeta}</div>` : ''}
    </div>
    <div class="acciones">
      <button class="btn-play" onclick="playDesdeIndice(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></button>
      <button class="btn-heart ${esGuardada?'guardado':''}" onclick="toggleGuardar('${c.artista.replace(/'/g,"\\'")}','${c.titulo.replace(/'/g,"\\'")}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="${esGuardada?'#16a34a':'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
    </div>
  </div>`;
}

// METADATOS (Last.fm)
async function cargarMetaLastFM(artista, titulo){
  const k = artista+'||'+titulo;
  if(metaCache[k]) return;
  try{
    const url = `https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_API_KEY}&artist=${encodeURIComponent(artista)}&track=${encodeURIComponent(titulo)}&format=json`;
    const r = await fetch(url); const json = await r.json();
    let album = json.track?.album?.title || '';
    let cover = json.track?.album?.image?.[3]?.['#text'] || ''; 
    metaCache[k] = { album, cover, date: '' }; 
    localStorage.setItem('meta', JSON.stringify(metaCache));
    renderizar();
  }catch{}
}

// LÓGICA DEL REPRODUCTOR
async function playDesdeIndice(idx){
  colaIndex = idx;
  const c = cola[idx];
  document.getElementById('mini-player').classList.add('visible');
  document.getElementById('mp-titulo').textContent = c.titulo;
  document.getElementById('mp-artista').textContent = c.artista;
  
  document.getElementById('mp-progress').style.width = '0%';
  document.getElementById('fp-progress').style.width = '0%';
  document.querySelectorAll('#mp-time-current, #mp-time-total, #fp-time-current, #fp-time-total').forEach(el => el.textContent = '0:00');

  const meta = metaCache[c.artista+'||'+c.titulo];
  document.getElementById('fp-title').textContent = c.titulo;
  document.getElementById('fp-artist').textContent = c.artista;
  document.getElementById('fp-album').textContent = meta?.album || 'Álbum desconocido';
  if(meta?.cover) {
    document.getElementById('fp-cover').src = meta.cover;
  } else {
    document.getElementById('fp-cover').src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='; // fallback
  }
  
  document.getElementById('fp-lyrics').innerHTML = 'Buscando letras...';
  fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(c.artista)}/${encodeURIComponent(c.titulo)}`)
    .then(r=>r.json()).then(d=> { document.getElementById('fp-lyrics').innerText = d.lyrics || 'Letra no disponible'; })
    .catch(()=> { document.getElementById('fp-lyrics').innerText = 'Letra no disponible'; });

  actualizarEstadoGuardado();
  
  const q = encodeURIComponent(c.artista + ' ' + c.titulo + ' audio');
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`;
  const r = await fetch(url); const json = await r.json();
  const vid = json.items?.[0]?.id?.videoId;
  if(vid && ytPlayer) ytPlayer.loadVideoById(vid);
}

function togglePlayPause(e){
  e.stopPropagation();
  if(!ytPlayer) return;
  if(isPaused) ytPlayer.playVideo(); else ytPlayer.pauseVideo();
}

function actualizarIconoPlay(){
  document.getElementById('mp-icon').innerHTML = isPaused ? 
    '<polygon points="5,3 19,12 5,21"/>' : 
    '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
}

function nextCancion(){ if(colaIndex < cola.length-1) playDesdeIndice(colaIndex+1); }

// UI PANTALLA COMPLETA
function abrirFullPlayer(e){
  if(e.target.closest('.ctrl-btn') || e.target.closest('.btn-heart')) return;
  document.getElementById('full-player').classList.add('open');
}
function cerrarFullPlayer(){ document.getElementById('full-player').classList.remove('open'); }

// GUARDAR
function toggleGuardarActual(e){
  e.stopPropagation();
  if(colaIndex >= 0) toggleGuardar(cola[colaIndex].artista, cola[colaIndex].titulo);
}
function toggleGuardar(artista, titulo){
  const k = artista+'||'+titulo;
  guardadas[k] = !guardadas[k];
  if(!guardadas[k]) delete guardadas[k];
  localStorage.setItem('guardadas', JSON.stringify(guardadas));
  actualizarEstadoGuardado();
  renderizar();
}
function actualizarEstadoGuardado(){
  if(colaIndex < 0) return;
  const c = cola[colaIndex];
  const esG = guardadas[c.artista+'||'+c.titulo];
  document.getElementById('mp-heart').style.color = esG ? 'var(--green)' : 'var(--muted)';
}
</script>
