<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#EDEAE3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>nanana</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EDEAE3;
  --card: #E5E2DB;
  --white: #FAF8F5;
  --text: #1C1917;
  --text2: #57534E;
  --muted: #A8A29E;
  --border: rgba(0,0,0,0.08);
  --orange: #E8490A;
  --orange-light: rgba(232,73,10,0.08);
  --green: #16a34a;
  --green-light: rgba(22,163,74,0.08);
  --player-bg: #1C1917;
  --player-text: #FAF8F5;
  --player-muted: #A8A29E;
  --r: 12px;
  --font: 'Inter', -apple-system, sans-serif;
  --serif: 'Playfair Display', Georgia, serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100dvh; -webkit-font-smoothing: antialiased; padding-bottom: calc(90px + env(safe-area-inset-bottom)); }

/* ── HEADER ─────────────────────────────────── */
header { padding: 20px 20px 0; padding-top: calc(20px + env(safe-area-inset-top)); }
.header-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--orange); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.logo { font-family: var(--serif); font-size: 32px; color: var(--text); line-height: 1; letter-spacing: -1px; }
.header-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
.btn-config { background: var(--white); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-size: 11px; font-weight: 600; padding: 6px 12px; cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 5px; -webkit-tap-highlight-color: transparent; }

/* CONFIG */
#config-panel { display: none; background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; margin: 0 20px 16px; }
#config-panel.visible { display: block; }
.config-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
#api-url { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; padding: 9px 11px; outline: none; margin-bottom: 8px; font-family: var(--font); }
#api-url:focus { border-color: var(--orange); }
.btn-config-save { width: 100%; background: var(--orange); border: none; border-radius: 8px; color: white; font-size: 13px; font-weight: 700; padding: 10px; cursor: pointer; font-family: var(--font); }

/* ── BÚSQUEDA ────────────────────────────────── */
.search-wrap { position: relative; margin: 0 20px 20px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
#buscar { width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: 24px; color: var(--text); font-size: 14px; padding: 11px 16px 11px 36px; outline: none; transition: border-color .2s; font-family: var(--font); }
#buscar:focus { border-color: var(--orange); }
#buscar::placeholder { color: var(--muted); }

/* ── NAV TABS ────────────────────────────────── */
.nav-tabs { display: flex; padding: 0 20px; gap: 24px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.nav-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 11px; font-weight: 700; padding: 0 0 12px; cursor: pointer; font-family: var(--font); letter-spacing: 0.8px; text-transform: uppercase; transition: color .15s, border-color .15s; -webkit-tap-highlight-color: transparent; }
.nav-tab.activo { color: var(--text); border-bottom-color: var(--text); }

/* ── FILTROS ─────────────────────────────────── */
.filtros { display: flex; gap: 6px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
.filtros::-webkit-scrollbar { display: none; }
.pill { flex-shrink: 0; background: var(--white); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-size: 11px; font-weight: 600; padding: 6px 14px; cursor: pointer; transition: all .15s; white-space: nowrap; -webkit-tap-highlight-color: transparent; font-family: var(--font); }
.pill.activo { background: var(--text); border-color: var(--text); color: var(--white); }

/* ── MAIN ────────────────────────────────────── */
main { padding: 0 20px; }

/* ── HERO CARD (canción actual) ──────────────── */
.hero-card { border-radius: 16px; overflow: hidden; position: relative; margin-bottom: 28px; background: var(--card); aspect-ratio: 1; }
.hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.hero-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 80px; background: linear-gradient(135deg, #D4CFC7, #C8C3BA); }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 50%, transparent 100%); }
.hero-top { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; justify-content: space-between; align-items: center; }
.hero-badge { background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 10px; font-size: 10px; font-weight: 600; color: white; letter-spacing: 0.5px; }
.hero-pistas { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.7); letter-spacing: 0.5px; }
.hero-bottom { position: absolute; bottom: 14px; left: 14px; right: 14px; display: flex; align-items: flex-end; justify-content: space-between; }
.hero-label { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.hero-titulo { font-size: 26px; font-weight: 800; color: white; letter-spacing: -0.5px; line-height: 1.1; }
.hero-artista { font-size: 14px; color: var(--orange); font-weight: 600; margin-top: 2px; }
.hero-play-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--orange); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; box-shadow: 0 4px 16px rgba(232,73,10,0.4); transition: transform .1s; }
.hero-play-btn:active { transform: scale(0.94); }

/* ── SECCIÓN LABEL ───────────────────────────── */
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sec-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.sec-count { font-size: 10px; color: var(--muted); font-weight: 600; }

/* ── GRID TRACKLIST (horizontal scroll) ──────── */
.tracklist-grid { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; margin-bottom: 28px; margin-left: -20px; margin-right: -20px; padding-left: 20px; padding-right: 20px; }
.tracklist-grid::-webkit-scrollbar { display: none; }
.track-thumb { flex-shrink: 0; width: 120px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.track-thumb-img { width: 120px; height: 120px; border-radius: 10px; object-fit: cover; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 8px; overflow: hidden; }
.track-thumb-img img { width: 100%; height: 100%; object-fit: cover; }
.track-thumb-titulo { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-thumb-artista { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

/* ── LISTA EMISIONES ─────────────────────────── */
.emisiones-list { margin-bottom: 28px; }
.emision-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
.emision-row:first-child { border-top: 1px solid var(--border); }
.emision-fecha { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.emision-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.emision-link { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; gap: 3px; }

/* ── LISTA COMPLETA (tab Emisiones/Canciones) ── */
.grupo-fecha { margin-bottom: 6px; }
.fecha-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; border-top: 1px solid var(--border); }
.fecha-titulo { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.fecha-sub { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.fecha-count-badge { font-size: 11px; color: var(--muted); font-weight: 600; background: var(--card); padding: 3px 9px; border-radius: 12px; }
.fecha-chevron { color: var(--muted); transition: transform .2s; }
.grupo-fecha.colapsado .fecha-chevron { transform: rotate(-90deg); }
.grupo-fecha.colapsado .lista-canciones { display: none; }
.lista-canciones { padding-bottom: 8px; }

/* ── CARD CANCIÓN LISTA ──────────────────────── */
.cancion-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); -webkit-tap-highlight-color: transparent; }
.cancion-row:last-child { border-bottom: none; }
.cancion-art { width: 44px; height: 44px; border-radius: 8px; background: var(--card); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; position: relative; }
.cancion-art img { width: 100%; height: 100%; object-fit: cover; }
.cancion-art-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .15s; border-radius: 8px; }
.cancion-art:hover .cancion-art-overlay, .cancion-row.reproduciendo .cancion-art-overlay { opacity: 1; }
.cancion-row.reproduciendo .cancion-art { border: 2px solid var(--orange); }
.cancion-info { flex: 1; min-width: 0; cursor: pointer; }
.cancion-titulo { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.cancion-artista { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; font-weight: 500; }
.cancion-meta-small { font-size: 10px; color: var(--orange); margin-top: 2px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cancion-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.btn-heart-row { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; }
.btn-heart-row.guardado { color: var(--green); }
.btn-yt-row { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; text-decoration: none; }

/* ── NOVEDAD CARD (tab Canciones) ───────────── */
.novedad-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.novedad-date-chip { flex-shrink: 0; text-align: center; min-width: 38px; }
.novedad-date-day { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1; }
.novedad-date-mon { font-size: 9px; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: 0.5px; }
.novedad-date-unknown { font-size: 11px; font-weight: 600; color: var(--muted); }

/* ── ESTADOS ─────────────────────────────────── */
.estado { text-align: center; padding: 50px 20px; color: var(--muted); }
.estado-emoji { font-size: 40px; display: block; margin-bottom: 14px; }
.estado h2 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.estado p { font-size: 13px; line-height: 1.6; max-width: 260px; margin: 0 auto; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MINI PLAYER ─────────────────────────────── */
#mini-player {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--player-bg);
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  display: none;
  cursor: pointer;
  border-top-left-radius: 16px; border-top-right-radius: 16px;
}
#mini-player.visible { display: block; }

.mp-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.mp-art { width: 44px; height: 44px; border-radius: 8px; background: #333; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.mp-art img { width: 100%; height: 100%; object-fit: cover; }
.mp-info { flex: 1; min-width: 0; }
.mp-titulo { font-size: 13px; font-weight: 700; color: var(--player-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mp-artista { font-size: 11px; color: var(--player-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.mp-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.mp-ctrl { background: none; border: none; color: var(--player-muted); cursor: pointer; padding: 4px; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
.mp-ctrl.primary { width: 36px; height: 36px; border-radius: 50%; background: var(--white); color: var(--text); display: flex; align-items: center; justify-content: center; }
.mp-ctrl.heart.guardado { color: var(--green); }
.mp-close-btn { background: none; border: none; color: var(--player-muted); cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent; }

/* Progress bar */
.mp-progress-wrap { position: relative; }
.mp-progress { width: 100%; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; cursor: pointer; }
.mp-progress-fill { height: 100%; background: var(--white); border-radius: 2px; width: 0%; transition: width .5s linear; pointer-events: none; }
.mp-times { display: flex; justify-content: space-between; margin-top: 4px; }
.mp-time { font-size: 9px; color: var(--player-muted); font-weight: 500; }

/* iframe oculto */
#yt-iframe { position: fixed; width: 1px; height: 1px; opacity: 0; bottom: 0; left: 0; pointer-events: none; }

/* ── FULLSCREEN PLAYER ───────────────────────── */
#fullscreen-player {
  position: fixed; inset: 0; z-index: 500;
  background: var(--bg);
  display: none; flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#fullscreen-player.visible { display: flex; }

.fp-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 0; padding-top: calc(16px + env(safe-area-inset-top)); flex-shrink: 0; }
.fp-minimize { background: var(--card); border: none; border-radius: 20px; padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; font-family: var(--font); display: flex; align-items: center; gap: 5px; -webkit-tap-highlight-color: transparent; }
.fp-yt-link { font-size: 11px; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: 0.5px; text-decoration: none; display: flex; align-items: center; gap: 4px; }

.fp-art-wrap { padding: 20px 28px 16px; flex-shrink: 0; }
.fp-art { width: 100%; aspect-ratio: 1; border-radius: 16px; overflow: hidden; background: var(--card); display: flex; align-items: center; justify-content: center; box-shadow: 0 24px 64px rgba(0,0,0,0.15); }
.fp-art img { width: 100%; height: 100%; object-fit: cover; }
.fp-art-placeholder { font-size: 80px; }

.fp-song-info { padding: 0 20px 12px; flex-shrink: 0; }
.fp-titulo { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.8px; line-height: 1.2; }
.fp-artista { font-size: 15px; color: var(--orange); font-weight: 600; margin-top: 2px; }
.fp-year { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 4px; }
.fp-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.fp-chip { font-size: 11px; font-weight: 600; color: var(--text2); background: var(--card); border-radius: 20px; padding: 4px 10px; }

.fp-progress-wrap { padding: 4px 20px 0; flex-shrink: 0; }
.fp-progress { width: 100%; height: 4px; background: var(--card); border-radius: 3px; cursor: pointer; position: relative; touch-action: none; }
.fp-progress-fill { height: 100%; background: var(--text); border-radius: 3px; width: 0%; pointer-events: none; }
.fp-times { display: flex; justify-content: space-between; margin-top: 6px; }
.fp-time { font-size: 11px; color: var(--muted); font-weight: 500; }

.fp-controls { display: flex; align-items: center; justify-content: center; gap: 28px; padding: 16px 20px 20px; flex-shrink: 0; }
.fp-btn { background: none; border: none; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; padding: 4px; }
.fp-btn.primary { width: 64px; height: 64px; border-radius: 50%; background: var(--text); color: var(--white); }
.fp-btn.heart.guardado { color: var(--green); }

/* Letra */
.fp-lyrics { padding: 0 20px 40px; flex-shrink: 0; }
.fp-lyrics-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.fp-lyrics-text { font-size: 15px; color: var(--text); line-height: 1.9; white-space: pre-wrap; font-weight: 400; }
.fp-lyrics-muted { font-size: 13px; color: var(--muted); font-style: italic; }
.lyrics-loading { display: flex; align-items: center; gap: 8px; }
.lyrics-spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .7s linear infinite; }

/* ── TOAST ───────────────────────────────────── */
#toast { position: fixed; bottom: calc(100px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: var(--white); font-size: 12px; font-weight: 600; padding: 9px 18px; border-radius: 20px; opacity: 0; transition: all .25s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap; pointer-events: none; font-family: var(--font); }
#toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

@media(min-width:480px){ body { max-width: 480px; margin: 0 auto; } #mini-player { max-width: 480px; left: 50%; transform: translateX(-50%); } }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">On Air · Radio 3</div>
  <div class="header-top">
    <div class="logo">nanana</div>
    <div class="header-actions">
      <button class="btn-config" onclick="toggleConfig()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Ajustes
      </button>
    </div>
  </div>
</header>

<div id="config-panel">
  <div class="config-label">URL del Google Apps Script</div>
  <input id="api-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">
  <button class="btn-config-save" onclick="guardarConfig()">Guardar y conectar</button>
</div>

<div class="search-wrap">
  <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input id="buscar" type="search" placeholder="Artista, canción, año de lanzamiento…" autocomplete="off" autocorrect="off">
</div>

<div class="nav-tabs">
  <button class="nav-tab activo" onclick="setTab('hoy',this)">Hoy</button>
  <button class="nav-tab" onclick="setTab('emisiones',this)">Emisiones</button>
  <button class="nav-tab" onclick="setTab('canciones',this)">Canciones</button>
  <button class="nav-tab" onclick="setTab('favoritos',this)">Favoritos</button>
</div>

<div class="filtros" id="filtros-wrap" style="display:none">
  <button class="pill activo" onclick="setFiltro('todas',this)">Todas</button>
  <button class="pill" onclick="setFiltro('guardadas-p',this)">Guardadas ♥</button>
</div>

<main id="main"></main>

<!-- MINI PLAYER -->
<div id="mini-player" onclick="abrirFullscreen()">
  <div class="mp-row">
    <div class="mp-art" id="mp-art"><span>🎵</span></div>

async function cargarDatos(){

    datos=j.datos||{};

    if(!Object.keys(datos).length) datos=demoData();

}

function renderEmisiones(){
  const main=document.getElementById('main');
  const q=busquedaActiva.toLowerCase();
  const fechas=Object.keys(datos).sort((a,b)=>b.localeCompare(a));

  let grupos=fechas.map(fecha=>{
    let canciones=datos[fecha];
    if(q) canciones=canciones.filter(c=>c.artista.toLowerCase().includes(q)||c.titulo.toLowerCase().includes(q));
    if(filtroActivo==='guardadas-p') canciones=canciones.filter(c=>guardadas[clave(c.artista,c.titulo)]);
    if(!canciones.length) return null;

  cola=[];
  grupos.forEach(g=>g.canciones.forEach(c=>cola.push({artista:c.artista,titulo:c.titulo})));

// ── TAB CANCIONES ─────────────────────────────
async function renderCanciones(){
  const main=document.getElementById('main');
  const q=busquedaActiva.toLowerCase();
  const vistas=new Set();
  let todas=[];
  Object.keys(datos).sort((a,b)=>b.localeCompare(a)).forEach(f=>{ datos[f].forEach(c=>{ const k=clave(c.artista,c.titulo); if(!vistas.has(k)){vistas.add(k);todas.push({...c,fechaPrograma:f});} }); });
  if(q) todas=todas.filter(c=>{
    const meta=metaCache[clave(c.artista,c.titulo)];
    return c.artista.toLowerCase().includes(q)||c.titulo.toLowerCase().includes(q)||
      (meta?.fecha_lanzamiento_iso||'').includes(q)||(meta?.fecha_lanzamiento||'').toLowerCase().includes(q)||
      (meta?.album||'').toLowerCase().includes(q);
  });
  if(!todas.length){ main.innerHTML=estadoVacio(q); return; }
  main.innerHTML=`<div class="estado"><div class="spinner"></div><p>Cargando metadatos…</p></div>`;
  const sinMeta=todas.filter(c=>!metaCache[clave(c.artista,c.titulo)]);
  for(let i=0;i<Math.min(sinMeta.length,60);i+=5){ await Promise.all(sinMeta.slice(i,i+5).map(c=>cargarMeta(c.artista,c.titulo))); await sleep(250); }
  todas.sort((a,b)=>{ const fa=metaCache[clave(a.artista,a.titulo)]?.fecha_lanzamiento_iso||'0000'; const fb=metaCache[clave(b.artista,b.titulo)]?.fecha_lanzamiento_iso||'0000'; return fb.localeCompare(fa); });
  const porAnyo={};
  todas.forEach(c=>{ const meta=metaCache[clave(c.artista,c.titulo)]; const anyo=meta?.fecha_lanzamiento_iso?.substring(0,4)||'?'; if(!porAnyo[anyo])porAnyo[anyo]=[]; porAnyo[anyo].push(c); });
  cola=todas.map(c=>({artista:c.artista,titulo:c.titulo}));
  const anyoActual=new Date().getFullYear().toString();
  const anyos=Object.keys(porAnyo).sort((a,b)=>b.localeCompare(a));
  const MESES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const MESES_FULL=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  main.innerHTML=anyos.map((anyo,gi)=>{
    const canciones=porAnyo[anyo], colapsado=anyo!==anyoActual&&gi>0&&!q;
    return `<div class="novedades-group${colapsado?' colapsado':''}" id="ng-${anyo}" style="margin-bottom:4px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;border-top:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent" onclick="toggleNovedadGroup('${anyo}')">
        <div style="font-size:15px;font-weight:700;color:${anyo===anyoActual?'var(--orange)':'var(--text)'};">${anyo==='?'?'Fecha desconocida':anyo}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--muted);font-weight:600;background:var(--card);padding:3px 9px;border-radius:12px;">${canciones.length}</span>
          <svg class="novedades-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="novedades-lista">
        ${canciones.map(c=>{
          const k=clave(c.artista,c.titulo), meta=metaCache[k], eG=guardadas[k]||c.guardada;
          const ci=cola.findIndex(x=>x.artista===c.artista&&x.titulo===c.titulo);
          const img=meta?.imagen||'';
          const ytUrl=`https://music.youtube.com/search?q=${encodeURIComponent(c.artista+' '+c.titulo)}`;
          let dateHtml='<div class="novedad-date-unknown">?</div>';
          if(meta?.fecha_lanzamiento_iso&&meta.fecha_lanzamiento_iso!=='0000'){
            const p=meta.fecha_lanzamiento_iso.split('-');
            if(p.length===3&&p[1]!=='00'&&p[2]!=='00'){
              dateHtml=`<div class="novedad-date-day">${parseInt(p[2])}</div><div class="novedad-date-mon">${MESES[parseInt(p[1])-1]}</div>`;
            } else { dateHtml=`<div class="novedad-date-day" style="font-size:14px">${p[0]}</div>`; }
          }
          return `<div class="novedad-row${eG?' guardada':''}" id="nr-${ci}">
            <div class="novedad-date-chip" onclick="playDesdeIndice(${ci})" style="cursor:pointer">${dateHtml}</div>
            <div class="cancion-art" onclick="playDesdeIndice(${ci})" style="cursor:pointer">
              ${img?`<img src="${img}" onerror="this.parentElement.innerHTML='🎵'">`:'🎵'}
              <div class="cancion-art-overlay"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>
            </div>
            <div class="cancion-info" onclick="playDesdeIndice(${ci})" style="cursor:pointer">
              <div class="cancion-titulo">${esc(c.titulo)}</div>
              <div class="cancion-artista">${esc(c.artista)}</div>
              ${meta?.album?`<div class="cancion-meta-small">💿 ${esc(meta.album)}</div>`:''}
            </div>
            <div class="cancion-right">
              <button class="btn-heart-row${eG?' guardado':''}" onclick="toggleGuardar('${esc(c.artista).replace(/'/g,"\\'")}','${esc(c.titulo).replace(/'/g,"\\'")}')">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="${eG?'#16a34a':'none'}" stroke="${eG?'#16a34a':'#A8A29E'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
              <a class="btn-yt-row" href="${ytUrl}" target="_blank">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="#A8A29E"><path d="M23.5 6.7a3 3 0 0 0-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.6A3 3 0 0 0 .5 6.7 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.3 3 3 0 0 0 2.1 2.1C4.5 20 12 20 12 20s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.3zM9.8 15.5V8.5l6.2 3.5-6.2 3.5z"/></svg>
              </a>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── TAB FAVORITOS ─────────────────────────────
function renderFavoritos(){
  const main=document.getElementById('main');
  const q=busquedaActiva.toLowerCase();
  const vistas=new Set(); let todas=[];
  Object.keys(datos).sort((a,b)=>b.localeCompare(a)).forEach(f=>{ datos[f].forEach(c=>{ const k=clave(c.artista,c.titulo); if(guardadas[k]&&!vistas.has(k)){vistas.add(k);todas.push({...c,fechaPrograma:f});} }); });
  if(q) todas=todas.filter(c=>c.artista.toLowerCase().includes(q)||c.titulo.toLowerCase().includes(q));
  if(!todas.length){ main.innerHTML=`<div class="estado"><span class="estado-emoji">♥</span><h2>Sin favoritos aún</h2><p>Dale al corazón en cualquier canción.</p></div>`; return; }
  cola=todas.map(c=>({artista:c.artista,titulo:c.titulo}));
  main.innerHTML=todas.map((c,i)=>renderCancionRow(c,i)).join('');
}

// ── MUSICBRAINZ + LASTFM ──────────────────────
async function cargarMeta(artista,titulo){
  const k=clave(artista,titulo);
  if(metaCache[k]) return;
  // 1. MusicBrainz
  try{
    const q=encodeURIComponent(`recording:"${titulo}" AND artist:"${artista}"`);
    const r=await fetch(`https://musicbrainz.org/ws/2/recording/?query=${q}&limit=1&fmt=json`,{headers:{'User-Agent':'NananaApp/1.0'}});
    if(r.ok){
      const j=await r.json();
      if(j.recordings?.length){
        const rec=j.recordings[0], rel=rec.releases?.[0];
        const album=rel?.title||'', fechaIso=rel?.date||rec.date||'';
        if(fechaIso){
          const imagen=await cargarImagenLastFm(artista,titulo);
          metaCache[k]={album,fecha_lanzamiento:fmtFecha(fechaIso),fecha_lanzamiento_iso:fechaIso,imagen};
          persistirMeta(); return;
        }
      }
    }
  }catch{}
  // 2. Last.fm
  try{
    const r=await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_KEY}&artist=${encodeURIComponent(artista)}&track=${encodeURIComponent(titulo)}&format=json`);
    if(r.ok){
      const j=await r.json(); const track=j.track;
      if(track){
        const album=track.album?.title||'';
        const imagen=track.album?.image?.find(i=>i.size==='extralarge')?.['#text']||track.album?.image?.find(i=>i.size==='large')?.['#text']||'';
        let fechaIso='';
        if(track.album?.mbid){
          try{ const r2=await fetch(`https://musicbrainz.org/ws/2/release/${track.album.mbid}?fmt=json`,{headers:{'User-Agent':'NananaApp/1.0'}}); if(r2.ok){const j2=await r2.json();fechaIso=j2.date||'';} }catch{}
        }
        metaCache[k]={album,fecha_lanzamiento:fmtFecha(fechaIso),fecha_lanzamiento_iso:fechaIso,imagen};
        persistirMeta(); return;
      }
    }
  }catch{}
  metaCache[k]={album:'',fecha_lanzamiento:'',fecha_lanzamiento_iso:'',imagen:''};
  persistirMeta();
}

async function cargarImagenLastFm(artista,titulo){
  try{
    const r=await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LASTFM_KEY}&artist=${encodeURIComponent(artista)}&track=${encodeURIComponent(titulo)}&format=json`);
    if(!r.ok) return '';
    const j=await r.json();
    return j.track?.album?.image?.find(i=>i.size==='extralarge')?.['#text']||j.track?.album?.image?.find(i=>i.size==='large')?.['#text']||'';
  }catch{return '';}
}

function fmtFecha(iso){
  if(!iso) return '';
  const p=iso.split('-');
  const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  if(p.length===3&&p[1]&&p[2]&&p[1]!=='00'&&p[2]!=='00') return `${parseInt(p[2])} ${m[parseInt(p[1])-1]} ${p[0]}`;
  if(p.length>=2&&p[1]&&p[1]!=='00') return `${m[parseInt(p[1])-1]} ${p[0]}`;
  return p[0]||'';
}

// ── LETRAS ────────────────────────────────────
async function cargarLetra(artista,titulo){
  const el=document.getElementById('fp-lyrics-content');
  el.innerHTML=`<div class="lyrics-loading"><div class="lyrics-spinner"></div><span style="font-size:13px;color:var(--muted)">Buscando letra…</span></div>`;
  try{
    const r=await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(artista)}/${encodeURIComponent(titulo)}`);
    if(!r.ok) throw new Error();
    const j=await r.json();
    if(j.lyrics) el.innerHTML=`<div class="fp-lyrics-text">${esc(j.lyrics.trim())}</div>`;
    else el.innerHTML=`<span class="fp-lyrics-muted">Letra no disponible</span>`;
  }catch{ el.innerHTML=`<span class="fp-lyrics-muted">Letra no disponible</span>`; }
}

// ── REPRODUCTOR ───────────────────────────────
async function playDesdeIndice(idx){
  if(idx<0||idx>=cola.length) return;
  colaIndex=idx; isPaused=false; cancionActual=cola[idx];
  if(!metaCache[clave(cancionActual.artista,cancionActual.titulo)]) await cargarMeta(cancionActual.artista,cancionActual.titulo);
  actualizarMiniPlayer();
  actualizarFullscreen();
  document.getElementById('mini-player').classList.add('visible');
  try{
    const vid=await buscarYT(cancionActual.artista,cancionActual.titulo);
    if(!vid) throw new Error();
    document.getElementById('yt-iframe').src=`https://www.youtube.com/embed/${vid}?autoplay=1&controls=0&enablejsapi=1&origin=${encodeURIComponent(location.origin)}`;
    iniciarProgreso();
  }catch{ mostrarToast('No encontrado en YouTube'); nextCancion(); }
  renderizar();
}

async function buscarYT(artista,titulo){
  const q=encodeURIComponent(artista+' '+titulo+' audio');
  const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`);
  const j=await r.json();
  return j.items?.[0]?.id?.videoId||null;
}

function actualizarMiniPlayer(){
  if(!cancionActual) return;
  document.getElementById('mp-titulo').textContent=cancionActual.titulo;
  document.getElementById('mp-artista').textContent=cancionActual.artista;
  const k=clave(cancionActual.artista,cancionActual.titulo);
  const meta=metaCache[k]; const img=meta?.imagen||'';
  const art=document.getElementById('mp-art');
  art.innerHTML=img?`<img src="${img}" onerror="this.parentElement.innerHTML='🎵'">`:'🎵';
  actualizarHeartMini();
}

function actualizarHeartMini(){
  if(!cancionActual) return;
  const eG=guardadas[clave(cancionActual.artista,cancionActual.titulo)];
  const btn=document.getElementById('mp-heart');
  btn.classList.toggle('guardado',!!eG);
  btn.querySelector('svg').setAttribute('fill',eG?'#16a34a':'none');
  btn.querySelector('svg').setAttribute('stroke',eG?'#16a34a':'currentColor');
}

function actualizarFullscreen(){
  if(!cancionActual) return;
  const k=clave(cancionActual.artista,cancionActual.titulo);
  const meta=metaCache[k]; const img=meta?.imagen||'';
  document.getElementById('fp-titulo').textContent=cancionActual.titulo;
  document.getElementById('fp-artista').textContent=cancionActual.artista;
  document.getElementById('fp-year').textContent=meta?.fecha_lanzamiento||'';
  document.getElementById('fp-ytlink').href=`https://music.youtube.com/search?q=${encodeURIComponent(cancionActual.artista+' '+cancionActual.titulo)}`;
  const art=document.getElementById('fp-art');
  art.innerHTML=img?`<img src="${img}" onerror="this.parentElement.innerHTML='<span class=fp-art-placeholder style=font-size:80px>🎵</span>'">`:'<span class="fp-art-placeholder" style="font-size:80px">🎵</span>';
  const chips=[];
  if(meta?.album) chips.push(meta.album);
  document.getElementById('fp-chips').innerHTML=chips.map(c=>`<span class="fp-chip">${esc(c)}</span>`).join('');
  const eG=guardadas[k];
  document.getElementById('fp-heart').classList.toggle('guardado',!!eG);
  document.getElementById('fp-heart-svg').setAttribute('fill',eG?'#16a34a':'none');
  document.getElementById('fp-heart-svg').setAttribute('stroke',eG?'#16a34a':'currentColor');
  if(document.getElementById('fullscreen-player').classList.contains('visible')) cargarLetra(cancionActual.artista,cancionActual.titulo);
}

function togglePlayPause(){
  isPaused=!isPaused;
  const iframe=document.getElementById('yt-iframe');
  iframe.contentWindow?.postMessage(isPaused?'{"event":"command","func":"pauseVideo","args":""}':'{"event":"command","func":"playVideo","args":""}','*');
  const pausa='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  const play='<polygon points="5,3 19,12 5,21"/>';
  document.getElementById('mp-icon').innerHTML=isPaused?play:pausa;
  document.getElementById('fp-icon').innerHTML=isPaused?play:pausa;
  renderizar();
}

function prevCancion(){ if(colaIndex>0) playDesdeIndice(colaIndex-1); }
function nextCancion(){ if(colaIndex<cola.length-1) playDesdeIndice(colaIndex+1); else mostrarToast('Fin de la lista'); }

function cerrarPlayer(){
  document.getElementById('mini-player').classList.remove('visible');
  document.getElementById('fullscreen-player').classList.remove('visible');
  document.getElementById('yt-iframe').src='';
  clearInterval(progressInterval);
  colaIndex=-1; isPaused=false; cancionActual=null;
  renderizar();
}

function abrirFullscreen(){
  document.getElementById('fullscreen-player').classList.add('visible');
  actualizarFullscreen();
  if(cancionActual) cargarLetra(cancionActual.artista,cancionActual.titulo);
}
function cerrarFullscreen(){ document.getElementById('fullscreen-player').classList.remove('visible'); }

// Progreso
function iniciarProgreso(){
  clearInterval(progressInterval);
  currentTime=0; currentDuration=0;
  actualizarProgreso();
  progressInterval=setInterval(()=>{ if(!isPaused){ currentTime+=1; actualizarProgreso(); } },1000);
}
function actualizarProgreso(){
  const pct=currentDuration>0?Math.min(100,currentTime/currentDuration*100):0;
  document.getElementById('mp-progress-fill').style.width=pct+'%';
  document.getElementById('fp-progress-fill').style.width=pct+'%';
  const tc=fmtTime(currentTime), tt=currentDuration>0?fmtTime(currentDuration):'—';
  document.getElementById('mp-time-cur').textContent=tc;
  document.getElementById('mp-time-tot').textContent=tt;
  document.getElementById('fp-time-cur2').textContent=tc;
  document.getElementById('fp-time-tot2').textContent=tt;
}
function seekBar(e,isFp){
  const bar=e.currentTarget, rect=bar.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  if(currentDuration>0) currentTime=Math.floor(pct*currentDuration);
  actualizarProgreso();
}
function fmtTime(s){ const m=Math.floor(s/60),sec=Math.floor(s%60); return`${m}:${sec.toString().padStart(2,'0')}`; }

// YT postMessage
window.addEventListener('message',e=>{
  try{
    const d=typeof e.data==='string'?JSON.parse(e.data):e.data;
    if(d.event==='infoDelivery'&&d.info?.duration) currentDuration=d.info.duration;
    if(d.event==='infoDelivery'&&d.info?.currentTime) currentTime=d.info.currentTime;
    if(d.event==='onStateChange'&&d.info===0) nextCancion();
  }catch{}
});

// ── GUARDAR ───────────────────────────────────
function toggleGuardar(artista,titulo){
  const k=clave(artista,titulo);
  guardadas[k]=!guardadas[k];
  persistirGuardadas();
  mostrarToast(guardadas[k]?'♥ Guardada':'Eliminada de favoritos');
  sincronizar(artista,titulo,guardadas[k]);
  actualizarHeartMini();
  actualizarFullscreen();
  renderizar();
}
function toggleGuardarActual(){ if(cancionActual) toggleGuardar(cancionActual.artista,cancionActual.titulo); }
async function sincronizar(a,t,g){ const url=getApiUrl(); if(!url) return; try{await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion:'guardar',artista:a,titulo:t,guardada:g})});}catch{} }

// ── HELPERS ───────────────────────────────────
function toggleGrupo(f){ document.getElementById('g-'+f)?.classList.toggle('colapsado'); }
function toggleNovedadGroup(a){ document.getElementById('ng-'+a)?.classList.toggle('colapsado'); }
function mostrarToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('visible'); setTimeout(()=>t.classList.remove('visible'),2200); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fechaISO(d){ return d.toISOString().split('T')[0]; }
const DIAS_ES=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES_FULL=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function formatFechaAmigable(iso){
  const[y,m,d]=iso.split('-').map(Number);
  const f=new Date(y,m-1,d);
  const hoy=fechaISO(new Date());
  if(iso===hoy) return 'Hoy';
  const ayer=fechaISO(new Date(Date.now()-86400000));
  if(iso===ayer) return 'Ayer';
  return`${d} de ${MESES_FULL[m-1]}`;
}
function estadoVacio(q){ return`<div class="estado"><span class="estado-emoji">🎵</span><h2>Nada por aquí</h2><p>${q?`Sin resultados para "${busquedaActiva}"`:'No hay canciones todavía.'}</p></div>`; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── INIT ──────────────────────────────────────
cargarGuardadas();
cargarMetaCache();
cargarDatos();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) cargarDatos(); });
</script>
