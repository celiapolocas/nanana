<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#EDEAE3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>nanana</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#EDEAE3; --card:#E5E2DB; --white:#FAF8F5;
  --text:#1C1917; --text2:#57534E; --muted:#A8A29E;
  --border:rgba(0,0,0,0.09);
  --orange:#E8490A;
  --green:#16a34a;
  --pbg:#1C1917; --ptxt:#FAF8F5; --pmut:#78716C;
  --font:'Inter',-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased;padding-bottom:calc(120px + env(safe-area-inset-bottom))}

/* HEADER */
header{padding:20px 20px 0;padding-top:calc(20px + env(safe-area-inset-top))}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.logo{font-size:34px;font-weight:900;color:var(--text);line-height:1;letter-spacing:-2px;font-style:italic}
.btn-cfg{background:var(--white);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:11px;font-weight:600;padding:7px 13px;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;margin-top:6px}

/* CONFIG */
#cfg-panel{display:none;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin:0 20px 16px}
#cfg-panel.on{display:block}
.cfg-lbl{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
#api-url{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:9px 11px;outline:none;margin-bottom:8px;font-family:var(--font)}
#api-url:focus{border-color:var(--orange)}
.btn-cfg-save{width:100%;background:var(--orange);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:10px;cursor:pointer;font-family:var(--font)}

/* SEARCH */
.sw{position:relative;margin:0 20px 20px}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#buscar{width:100%;background:var(--white);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:14px;padding:11px 16px 11px 36px;outline:none;transition:border-color .2s;font-family:var(--font)}
#buscar:focus{border-color:var(--orange)}
#buscar::placeholder{color:var(--muted)}

/* TABS */
.tabs{display:flex;padding:0 20px;gap:22px;margin-bottom:0;border-bottom:1px solid var(--border)}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:11px;font-weight:700;padding:0 0 11px;cursor:pointer;font-family:var(--font);letter-spacing:.8px;text-transform:uppercase;transition:color .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
.tab.on{color:var(--text);border-bottom-color:var(--text)}

/* PILLS */
.pills{display:flex;gap:6px;padding:14px 20px 0;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;background:var(--white);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:11px;font-weight:600;padding:6px 14px;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;font-family:var(--font)}
.pill.on{background:var(--text);border-color:var(--text);color:var(--white)}

main{padding:20px 20px 0}

/* HERO */
.hero{border-radius:16px;overflow:hidden;position:relative;margin-bottom:28px;background:var(--card);aspect-ratio:1;cursor:pointer}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,#D4CFC7,#C8C3BA)}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.15) 55%,transparent 100%)}
.hero-top{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center}
.hero-badge{background:rgba(255,255,255,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:5px 11px;font-size:10px;font-weight:600;color:#fff;letter-spacing:.3px}
.hero-tracks{font-size:10px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:.3px}
.hero-bot{position:absolute;bottom:14px;left:14px;right:14px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.hero-lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.hero-tit{font-size:26px;font-weight:900;color:#fff;letter-spacing:-.8px;line-height:1.05}
.hero-art{font-size:14px;color:var(--orange);font-weight:600;margin-top:3px}
.hero-play{width:52px;height:52px;border-radius:50%;background:var(--orange);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 20px rgba(232,73,10,.45);transition:transform .1s}
.hero-play:active{transform:scale(.93)}

/* SEC */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.sec-cnt{font-size:10px;color:var(--muted);font-weight:600}

/* GRID */
.tgrid{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:28px;margin-left:-20px;margin-right:-20px;padding-left:20px;padding-right:20px}
.tgrid::-webkit-scrollbar{display:none}
.tthumb{flex-shrink:0;width:118px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tthumb-img{width:118px;height:118px;border-radius:10px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:7px;overflow:hidden}
.tthumb-img img{width:100%;height:100%;object-fit:cover}
.tthumb-tit{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tthumb-art{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* EMISIONES lista */
.sec-emisiones{margin-bottom:20px}
.em-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.em-row:first-child{border-top:1px solid var(--border)}
.em-fecha{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.em-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.em-link{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:.4px;text-transform:uppercase}

/* GRUPO fecha */
.gfecha{margin-bottom:2px}
.fhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;cursor:pointer;-webkit-tap-highlight-color:transparent;border-top:1px solid var(--border)}
.ftit{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.fsub{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.fcnt{font-size:11px;color:var(--muted);font-weight:600;background:var(--card);padding:3px 9px;border-radius:12px}
.fchev{color:var(--muted);transition:transform .2s}
.gfecha.col .fchev{transform:rotate(-90deg)}
.gfecha.col .lcan{display:none}
.lcan{padding-bottom:6px}

/* CANCION ROW */
.crow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.crow:last-child{border-bottom:none}
.cart{width:46px;height:46px;border-radius:9px;background:var(--card);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;position:relative;transition:opacity .15s}
.cart img{width:100%;height:100%;object-fit:cover}
.cart-ov{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;border-radius:9px}
.crow.playing .cart-ov{opacity:1}
.crow.playing .cart{outline:2px solid var(--orange)}
.cinfo{flex:1;min-width:0;cursor:pointer}
.ctit{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.cart_{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-weight:500}
.cmeta{font-size:10px;color:var(--orange);margin-top:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cright{display:flex;align-items:center;gap:6px;flex-shrink:0}
.bhrow{background:none;border:none;cursor:pointer;color:var(--muted);padding:5px;-webkit-tap-highlight-color:transparent;display:flex}
.bhrow.on{color:var(--green)}
.bytrow{background:none;border:none;cursor:pointer;color:var(--muted);padding:5px;-webkit-tap-highlight-color:transparent;display:flex;text-decoration:none}

/* NOVEDAD row */
.nrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.nrow:last-child{border-bottom:none}
.nchip{flex-shrink:0;text-align:center;min-width:36px;cursor:pointer}
.nchip-day{font-size:18px;font-weight:800;color:var(--text);line-height:1}
.nchip-mon{font-size:9px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.3px}
.nchip-unk{font-size:11px;font-weight:600;color:var(--muted)}

/* ESTADO */
.estado{text-align:center;padding:50px 20px;color:var(--muted)}
.estado-e{font-size:40px;display:block;margin-bottom:14px}
.estado h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.estado p{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* â”€â”€ MINI PLAYER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#mp{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--pbg);
  border-top-left-radius:20px;border-top-right-radius:20px;
  padding:14px 16px calc(16px + env(safe-area-inset-bottom));
  display:none;cursor:pointer;
  box-shadow:0 -8px 40px rgba(0,0,0,.25);
}
#mp.on{display:block}
.mp-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.mp-art{width:50px;height:50px;border-radius:10px;background:#333;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.mp-art img{width:100%;height:100%;object-fit:cover}
.mp-nfo{flex:1;min-width:0}
.mp-tit{font-size:14px;font-weight:700;color:var(--ptxt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-art_{font-size:11px;color:var(--pmut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.mp-ctrls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mpc{background:none;border:none;color:var(--pmut);cursor:pointer;padding:5px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
.mpc.pri{width:40px;height:40px;border-radius:50%;background:var(--ptxt);color:var(--pbg);display:flex;align-items:center;justify-content:center;padding:0}
.mpc.hrt.on{color:var(--green)}
.mp-close{background:none;border:none;color:var(--pmut);cursor:pointer;padding:5px;-webkit-tap-highlight-color:transparent}
/* Progress */
.mp-prog-wrap{display:flex;flex-direction:column;gap:5px}
.mp-prog{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:3px;cursor:pointer;position:relative;touch-action:none}
.mp-prog-fill{height:100%;background:rgba(255,255,255,.7);border-radius:3px;width:0%;pointer-events:none;transition:width .4s linear}
.mp-times{display:flex;justify-content:space-between}
.mp-t{font-size:10px;color:var(--pmut);font-weight:500;font-variant-numeric:tabular-nums}

/* iframe oculto */
#ytf{position:fixed;width:1px;height:1px;opacity:0;bottom:0;left:0;pointer-events:none;border:none}

/* â”€â”€ FULLSCREEN â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#fp{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);
  display:none;flex-direction:column;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#fp.on{display:flex}

.fp-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;padding-top:calc(14px + env(safe-area-inset-top));flex-shrink:0}
.fp-down{background:var(--card);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;color:var(--text2)}
.fp-ytl{font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;text-decoration:none;display:flex;align-items:center;gap:4px}

.fp-art-wrap{padding:18px 28px 14px;flex-shrink:0}
.fp-art{width:100%;aspect-ratio:1;border-radius:18px;overflow:hidden;background:var(--card);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,.14)}
.fp-art img{width:100%;height:100%;object-fit:cover}
.fp-art-ph{font-size:80px}

.fp-nfo{padding:0 20px 10px;flex-shrink:0}
.fp-tit{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-1px;line-height:1.15}
.fp-art_{font-size:15px;color:var(--orange);font-weight:600;margin-top:3px}
.fp-meta{font-size:12px;color:var(--muted);margin-top:5px;font-weight:500}
.fp-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.fp-chip{font-size:11px;font-weight:600;color:var(--text2);background:var(--card);border-radius:20px;padding:4px 11px}

.fp-prog-wrap{padding:6px 20px 0;flex-shrink:0}
.fp-prog{width:100%;height:5px;background:var(--card);border-radius:3px;cursor:pointer;position:relative;touch-action:none}
.fp-prog-fill{height:100%;background:var(--text);border-radius:3px;width:0%;pointer-events:none}
.fp-times{display:flex;justify-content:space-between;margin-top:6px}
.fp-t{font-size:11px;color:var(--muted);font-weight:500;font-variant-numeric:tabular-nums}

.fp-ctrls{display:flex;align-items:center;justify-content:center;gap:26px;padding:14px 20px 18px;flex-shrink:0}
.fpc{background:none;border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;padding:4px}
.fpc.pri{width:66px;height:66px;border-radius:50%;background:var(--text);color:var(--white)}
.fpc.hrt.on{color:var(--green)}

.fp-lyrics{padding:0 20px 48px;flex-shrink:0}
.fp-lyrics-ey{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.fp-lyrics-txt{font-size:15px;color:var(--text);line-height:1.95;white-space:pre-wrap;font-weight:400}
.fp-lyrics-mut{font-size:13px;color:var(--muted);font-style:italic}
.lspin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

/* TOAST */
#toast{position:fixed;bottom:calc(130px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--white);font-size:12px;font-weight:600;padding:9px 18px;border-radius:20px;opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;pointer-events:none;font-family:var(--font)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:480px){body,header,.tabs,.pills,main,#mp{max-width:480px;margin-left:auto;margin-right:auto;left:0;right:0} #mp{left:50%;transform:translateX(-50%)} }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">nanana</div>
    <button class="btn-cfg" onclick="toggleCfg()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Ajustes
    </button>
  </div>
</header>

<div id="cfg-panel">
  <div class="cfg-lbl">URL del Google Apps Script</div>
  <input id="api-url" type="url" placeholder="https://script.google.com/macros/s/â€¦/exec">
  <button class="btn-cfg-save" onclick="saveCfg()">Guardar y conectar</button>
</div>

<div class="sw">
  <svg class="si" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input id="buscar" type="search" placeholder="Artista, canciĂłn, aĂ±o de lanzamientoâ€¦" autocomplete="off" autocorrect="off">
</div>

<div class="tabs">
  <button class="tab on" onclick="setTab('hoy',this)">Hoy</button>
  <button class="tab" onclick="setTab('emisiones',this)">Emisiones</button>
  <button class="tab" onclick="setTab('canciones',this)">Canciones</button>
  <button class="tab" onclick="setTab('favoritos',this)">Favoritos</button>
</div>
<div class="pills" id="pills-wrap" style="display:none">
  <button class="pill on" onclick="setFiltro('todas',this)">Todas</button>
  <button class="pill" onclick="setFiltro('guardadas',this)">Guardadas â™Ą</button>
</div>

<main id="main"></main>

<!-- MINI PLAYER -->
<div id="mp" onclick="openFP()">
  <div class="mp-row">
    <div class="mp-art" id="mp-art">đźŽµ</div>
    <div class="mp-nfo">
      <div class="mp-tit" id="mp-tit">â€”</div>
      <div class="mp-art_" id="mp-art_">â€”</div>
    </div>
    <div class="mp-ctrls" onclick="event.stopPropagation()">
      <button class="mpc hrt" id="mp-hrt" onclick="toggleSaveNow()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="mp-hrt-svg"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="mpc" onclick="prev()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
      <button class="mpc pri" id="mp-pp" onclick="togglePP()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" id="mp-ico"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="mpc" onclick="next()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>

// â”€â”€ CANCIONES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function renderCanciones(){
  const m=$('main');
  const vis=new Set(); let all=[];
  Object.keys(data).sort((a,b)=>b.localeCompare(a)).forEach(f=>{
    (data[f]||[]).forEach(c=>{ const a=c.a||c.artista, t=c.t||c.titulo, ck_=k(a,t); if(!vis.has(ck_)){vis.add(ck_);all.push({a,t,f});} });
  });
  // Filtrar por q (solo metadatos de lanzamiento, NO fecha programa)
  if(q){
    all=all.filter(c=>{
      const cm=mcache[k(c.a,c.t)]||{};
      return c.a.toLowerCase().includes(q.toLowerCase())||c.t.toLowerCase().includes(q.toLowerCase())||
        (cm.dateiso||'').includes(q)||(cm.date||'').toLowerCase().includes(q.toLowerCase())||(cm.album||'').toLowerCase().includes(q.toLowerCase());
    });
  }
  if(!all.length){ m.innerHTML=estado('đźŽµ','Sin resultados',''); return; }
  m.innerHTML=`<div class="estado"><div class="spin"></div><p>Cargando metadatosâ€¦</p></div>`;
  // Cargar meta que falte en lotes
  const sinM=all.filter(c=>!mcache[k(c.a,c.t)]);
  for(let i=0;i<Math.min(sinM.length,80);i+=6){
    await Promise.all(sinM.slice(i,i+6).map(c=>getMeta(c.a,c.t)));
    await sleep(200);
  }
  // Ordenar por fecha lanzamiento desc
  all.sort((a,b)=>{
    const da=mcache[k(a.a,a.t)]?.dateiso||'0000', db=mcache[k(b.a,b.t)]?.dateiso||'0000';
    return db.localeCompare(da);
  });
  // Agrupar por aĂ±o
  const byY={};
  all.forEach(c=>{ const cm=mcache[k(c.a,c.t)]||{}; const y=cm.dateiso?.substring(0,4)||'?'; if(!byY[y])byY[y]=[]; byY[y].push(c); });
  cola=all.map(c=>({a:c.a,t:c.t}));
  const curY=new Date().getFullYear().toString();
  const MESES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  m.innerHTML=Object.keys(byY).sort((a,b)=>b.localeCompare(a)).map((y,gi)=>{
    const cans=byY[y], col=y!==curY&&gi>0&&!q;
    return `<div class="${col?'col':''}" id="ny-${y}" style="margin-bottom:2px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;border-top:1px solid var(--border);cursor:pointer" onclick="toggleNY('${y}')">
        <div style="font-size:15px;font-weight:700;color:${y===curY?'var(--orange)':'var(--text)'}">${y==='?'?'Fecha desconocida':y}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:var(--muted);font-weight:600;background:var(--card);padding:3px 9px;border-radius:12px">${cans.length}</span>
          <svg class="ny-chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="ny-list" style="${col?'display:none':''}">
        ${cans.map(c=>{
          const ck_=k(c.a,c.t), cm=mcache[ck_]||{}, eG=saved[ck_];
          const ci=cola.findIndex(x=>x.a===c.a&&x.t===c.t);
          const ytU=`https://music.youtube.com/search?q=${encodeURIComponent(c.a+' '+c.t)}`;
          let dc='';
          if(cm.dateiso&&cm.dateiso!=='0000'){

// â”€â”€ META â€” MusicBrainz + LastFM + Deezer â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function getMeta(a,t){
  const ck_=k(a,t);
  if(mcache[ck_]) return mcache[ck_];
  let result={album:'',date:'',dateiso:'',img:''};

  // 1. MusicBrainz
  try{
    const enc=encodeURIComponent;
    const url=`https://musicbrainz.org/ws/2/recording/?query=recording:${enc('"'+t+'"')}+AND+artist:${enc('"'+a+'"')}&limit=3&fmt=json`;
    const r=await fetch(url,{headers:{'User-Agent':'NananaApp/2.0 (nanana@radio3.es)'}});
    if(r.ok){
      const j=await r.json();
      const recs=j.recordings||[];
      for(const rec of recs){
        const rel=rec.releases?.[0];
        if(rel){
          const d=rel.date||rec.date||'';
          if(d){ result.album=rel.title||''; result.dateiso=d; result.date=fmtD(d); break; }
        }
      }
    }
  }catch{}

  // 2. Last.fm â€” siempre intentar para imagen y completar Ăˇlbum/fecha
  try{
    const url=`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LFK}&artist=${encodeURIComponent(a)}&track=${encodeURIComponent(t)}&format=json`;
    const r=await fetch(url);
    if(r.ok){
      const j=await r.json();
      const tr=j.track;
      if(tr){
        if(!result.album&&tr.album?.title) result.album=tr.album.title;
        // Imagen de mayor resoluciĂłn disponible
        const imgs=tr.album?.image||[];
        const imgUrl=(imgs.find(i=>i.size==='extralarge')||imgs.find(i=>i.size==='large')||imgs.find(i=>i.size==='medium')||{})['#text']||'';
        if(imgUrl&&!imgUrl.includes('2a96cbd8b46e442fc41c2b86b821562f')) result.img=imgUrl; // filtrar placeholder
        // Si no tenemos fecha, intentar via mbid del Ăˇlbum
        if(!result.dateiso&&tr.album?.mbid){
          try{
            const r2=await fetch(`https://musicbrainz.org/ws/2/release/${tr.album.mbid}?fmt=json`,{headers:{'User-Agent':'NananaApp/2.0'}});
            if(r2.ok){ const j2=await r2.json(); if(j2.date){result.dateiso=j2.date;result.date=fmtD(j2.date);} }
          }catch{}
        }
      }
    }
  }catch{}

  // 3. Deezer â€” imagen alternativa si no la tenemos
  if(!result.img){
    try{
      const url=`https://api.deezer.com/search/track?q=${encodeURIComponent(a+' '+t)}&limit=1&output=json`;
      const r=await fetch(url);
      if(r.ok){
        const j=await r.json();
        const tr=j.data?.[0];
        if(tr){
          if(tr.album?.cover_xl) result.img=tr.album.cover_xl;
          else if(tr.album?.cover_big) result.img=tr.album.cover_big;
          if(!result.album&&tr.album?.title) result.album=tr.album.title;
          if(!result.dateiso&&tr.album?.release_date){ result.dateiso=tr.album.release_date; result.date=fmtD(tr.album.release_date); }
        }
      }
    }catch{}
  }

  // 4. iTunes Search â€” imagen alternativa
  if(!result.img){
    try{
      const url=`https://itunes.apple.com/search?term=${encodeURIComponent(a+' '+t)}&media=music&limit=1`;
      const r=await fetch(url);
      if(r.ok){
        const j=await r.json();
        const item=j.results?.[0];
        if(item){
          const img=(item.artworkUrl100||'').replace('100x100bb','600x600bb');
          if(img) result.img=img;
          if(!result.album&&item.collectionName) result.album=item.collectionName;
          if(!result.dateiso&&item.releaseDate){ result.dateiso=item.releaseDate.substring(0,10); result.date=fmtD(result.dateiso); }
        }
      }
    }catch{}
  }

  mcache[ck_]=result;
  saveMeta();
  return result;
}

function fmtD(iso){
  if(!iso) return '';
  const p=iso.split('-'), M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  if(p.length>=3&&p[1]&&p[1]!=='00'&&p[2]&&p[2]!=='00') return`${parseInt(p[2])} ${M[parseInt(p[1])-1]} ${p[0]}`;
  if(p.length>=2&&p[1]&&p[1]!=='00') return`${M[parseInt(p[1])-1]} ${p[0]}`;
  return p[0]||'';
}

// â”€â”€ LETRAS â€” lrclib (mĂˇs fiable) + lyrics.ovh fallback â”€â”€â”€
async function loadLyrics(a,t){
  const el=$('fp-lyr');
  el.innerHTML=`<span class="fp-lyrics-mut"><span class="lspin"></span> Buscando letraâ€¦</span>`;
  // 1. lrclib.net (no CORS issues, muy completo)
  try{
    const url=`https://lrclib.net/api/search?q=${encodeURIComponent(a+' '+t)}&limit=1`;
    const r=await fetch(url);
    if(r.ok){
      const j=await r.json();
      const item=j[0];
      if(item?.plainLyrics){ el.innerHTML=`<div class="fp-lyrics-txt">${esc(item.plainLyrics.trim())}</div>`; return; }
    }
  }catch{}
  // 2. lrclib by artist+track
  try{
    const url=`https://lrclib.net/api/get?artist_name=${encodeURIComponent(a)}&track_name=${encodeURIComponent(t)}`;
    const r=await fetch(url);
    if(r.ok){
      const j=await r.json();
      if(j?.plainLyrics){ el.innerHTML=`<div class="fp-lyrics-txt">${esc(j.plainLyrics.trim())}</div>`; return; }
    }
  }catch{}
  // 3. lyrics.ovh fallback
  try{
    const url=`https://api.lyrics.ovh/v1/${encodeURIComponent(a)}/${encodeURIComponent(t)}`;
    const r=await fetch(url);
    if(r.ok){
      const j=await r.json();
      if(j?.lyrics&&j.lyrics.trim()){ el.innerHTML=`<div class="fp-lyrics-txt">${esc(j.lyrics.trim())}</div>`; return; }
    }
  }catch{}
  el.innerHTML=`<span class="fp-lyrics-mut">Letra no disponible</span>`;
}

// â”€â”€ PLAYER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function play(i){
  if(i<0||i>=cola.length) return;
  idx=i; paused=false; now=cola[i];
  const ck_=k(now.a,now.t);
  if(!mcache[ck_]) await getMeta(now.a,now.t);
  updateMiniPlayer();
  updateFP();
  $('mp').classList.add('on');
  // Buscar en YouTube y reproducir
  try{
    const vid=await ytSearch(now.a,now.t);
    if(!vid) throw 0;
    const iframe=$('ytf');
    iframe.src=`https://www.youtube.com/embed/${vid}?autoplay=1&controls=0&enablejsapi=1&origin=${encodeURIComponent(location.origin)}&rel=0`;
    startProg();
  }catch{
    toast('No encontrado en YouTube');
    next();
  }
  render();
}

async function ytSearch(a,t){
  const qe=encodeURIComponent(a+' '+t+' official audio');
  const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${qe}&type=video&maxResults=3&key=${YTK}`);
  const j=await r.json();
  // Preferir resultados con "official" o "audio" en el tĂ­tulo
  const items=j.items||[];
  const best=items.find(i=>{ const tl=(i.snippet?.title||'').toLowerCase(); return tl.includes('official')||tl.includes('audio'); });
  return (best||items[0])?.id?.videoId||null;
}

// â”€â”€ PROGRESS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function startProg(){
  clearInterval(prog_interval);
  cur=0; dur=0; updateProg();
  prog_interval=setInterval(()=>{ if(!paused){ cur+=1; updateProg(); } },1000);
}

function updateProg(){
  const pct=dur>0?Math.min(100,cur/dur*100):0;
  $('mp-pf').style.width=pct+'%';
  $('fp-pf').style.width=pct+'%';
  const tc=ft(cur), tt=dur>0?ft(dur):'â€”';
  $('mp-tc').textContent=tc; $('mp-tt').textContent=tt;
  $('fp-tc').textContent=tc; $('fp-tt').textContent=tt;
}

// Seek tĂˇctil â€” arrastrando la barra
function startSeek(e,isFP){
  e.stopPropagation();
  const bar=e.currentTarget;
  function doSeek(ev){
    const touch=ev.touches?ev.touches[0]:ev;
    const rect=bar.getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,(touch.clientX-rect.left)/rect.width));
    if(dur>0){
      cur=Math.floor(pct*dur);
      updateProg();
      // Intentar seek en el iframe via postMessage con tiempo
      try{ $('ytf').contentWindow?.postMessage(`{"event":"command","func":"seekTo","args":[${cur},true]}`,'*'); }catch{}
    }
  }
  doSeek(e);
  const up=()=>{ document.removeEventListener('mousemove',doSeek); document.removeEventListener('touchmove',doSeek); document.removeEventListener('mouseup',up); document.removeEventListener('touchend',up); };
  document.addEventListener('mousemove',doSeek,{passive:true});
  document.addEventListener('touchmove',doSeek,{passive:true});
  document.addEventListener('mouseup',up);
  document.addEventListener('touchend',up);
}

function ft(s){ const m=Math.floor(s/60),sc=Math.floor(s%60); return`${m}:${sc.toString().padStart(2,'0')}`; }

// YT IFrame postMessage para estado y duraciĂłn
window.addEventListener('message',e=>{
  try{
    const d=typeof e.data==='string'?JSON.parse(e.data):e.data;
    if(d.event==='infoDelivery'){
      if(d.info?.duration&&d.info.duration>0) dur=d.info.duration;
      if(d.info?.currentTime) cur=d.info.currentTime;
    }
    if(d.event==='onStateChange'&&d.info===0) next(); // ended
    if(d.event==='onStateChange'&&d.info===1) paused=false; // playing
    if(d.event==='onStateChange'&&d.info===2) paused=true;  // paused
  }catch{}
});

}

function toggleG(f){ $('g-'+f)?.classList.toggle('col'); }
function matchQ(c){ if(!q) return true; const a=(c.a||c.artista||'').toLowerCase(), t=(c.t||c.titulo||'').toLowerCase(), lq=q.toLowerCase(); return a.includes(lq)||t.includes(lq); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2400); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function iso(d){ return d.toISOString().split('T')[0]; }
const MESES_F=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function amigable(s){
  const[y,m,d]=s.split('-').map(Number), f=new Date(y,m-1,d);
  if(s===iso(new Date())) return 'Hoy';
  if(s===iso(new Date(Date.now()-864e5))) return 'Ayer';
  return`${d} de ${MESES_F[m-1]}`;
}
function estado(em,h,p){ return`<div class="estado"><span class="estado-e">${em}</span><h2>${h}</h2><p>${p}</p></div>`; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function $$(s){ return Array.from(document.querySelectorAll(s)); }

// INIT
loadSaved(); loadMeta(); load();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) load(); });
