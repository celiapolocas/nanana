<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>nanana</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8;
  --white: #FFFFFF;
  --text: #1a1a1a;
  --muted: #8a8a8a;
  --border: #EBEBEB;
  --surface: #F3F3F0;
  --r: 14px;
  --g0: linear-gradient(135deg,#FF6B6B,#FF8E53);
  --g1: linear-gradient(135deg,#667EEA,#764BA2);
  --g2: linear-gradient(135deg,#F093FB,#F5576C);
  --g3: linear-gradient(135deg,#4FACFE,#00F2FE);
  --g4: linear-gradient(135deg,#43E97B,#38F9D7);
  --g5: linear-gradient(135deg,#FA709A,#FEE140);
  --g6: linear-gradient(135deg,#A18CD1,#FBC2EB);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:calc(20px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased;}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(250,250,248,0.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 16px 12px;padding-top:calc(14px + env(safe-area-inset-top));}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#667EEA,#F5576C,#FEE140);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.logo-sub{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;-webkit-text-fill-color:var(--muted);}
.header-right{display:flex;align-items:center;gap:8px;}
.meta-badge{font-size:11px;color:var(--muted);background:var(--surface);border-radius:20px;padding:4px 10px;}
.config-btn{background:var(--surface);border:none;border-radius:10px;color:var(--muted);cursor:pointer;padding:7px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent;}

/* CONFIG */
#config-panel{display:none;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;}
#config-panel.visible{display:block;}
.config-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
#api-url{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:8px 10px;outline:none;margin-bottom:8px;font-family:'Inter',sans-serif;}
#api-url:focus{border-color:#667EEA;}
.btn-guardar-config{width:100%;background:linear-gradient(135deg,#667EEA,#764BA2);border:none;border-radius:8px;color:white;font-size:13px;font-weight:600;padding:9px;cursor:pointer;font-family:'Inter',sans-serif;}

/* BÚSQUEDA */
.search-wrap{position:relative;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
#buscar{width:100%;background:var(--surface);border:1.5px solid transparent;border-radius:10px;color:var(--text);font-size:14px;padding:10px 12px 10px 34px;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;}
#buscar:focus{border-color:#667EEA;background:var(--white);}
#buscar::placeholder{color:var(--muted);}

/* FILTROS */
.filtros{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.filtros::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;background:var(--white);border:1.5px solid var(--border);border-radius:20px;color:var(--muted);font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif;}
.pill.activo{background:var(--text);border-color:var(--text);color:white;font-weight:600;}

/* MAIN */
main{padding-bottom:40px;}

/* GRUPO FECHA */
.grupo-fecha{margin-bottom:2px;}
.fecha-header{display:flex;align-items:center;gap:10px;padding:12px 16px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fecha-banda{height:36px;border-radius:10px;flex-shrink:0;width:5px;}
.fecha-info{flex:1;min-width:0;}
.fecha-dia{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);letter-spacing:-0.3px;line-height:1.1;}
.fecha-secundaria{font-size:11px;color:var(--muted);margin-top:1px;}
.fecha-derecha{display:flex;align-items:center;gap:6px;}
.fecha-count{font-size:11px;color:var(--muted);background:var(--surface);border-radius:10px;padding:3px 9px;}
.badge-pendientes{font-size:10px;font-weight:700;color:white;border-radius:10px;padding:3px 8px;}
.fecha-chevron{color:var(--muted);transition:transform .25s;flex-shrink:0;}
.grupo-fecha.colapsado .fecha-chevron{transform:rotate(-90deg);}
.grupo-fecha.colapsado .lista-canciones{display:none;}

/* LISTA */
.lista-canciones{padding:0 12px 6px;}

/* CARD CANCIÓN */
.cancion{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden;transition:border-color .15s;}
.cancion.guardada{border-color:#43E97B;background:#f6fff9;}
.cancion.reproduciendo{border-color:#667EEA;}

.cancion-main{display:flex;align-items:center;gap:10px;padding:11px 12px;}

.cancion-num{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}

.cancion-info{flex:1;min-width:0;cursor:pointer;}
.cancion-titulo{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.cancion-artista{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-weight:500;}

/* BOTONES ACCIÓN — siempre visibles */
.cancion-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}

.btn-play{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform .1s, opacity .15s;flex-shrink:0;}
.btn-play:active{transform:scale(0.92);}
.btn-play.loading{opacity:0.6;}

.btn-heart{width:32px;height:32px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:all .15s;flex-shrink:0;}
.btn-heart:active{transform:scale(0.88);}
.btn-heart.guardado{background:#f6fff9;border-color:#43E97B;}
.btn-heart svg{transition:fill .15s, stroke .15s;}

.btn-ytmusic{height:32px;border-radius:16px;background:#FFF0F0;border:1.5px solid #FFCDD2;color:#E53935;font-size:11px;font-weight:700;padding:0 10px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;-webkit-tap-highlight-color:transparent;text-decoration:none;font-family:'Inter',sans-serif;flex-shrink:0;}
.btn-ytmusic:active{opacity:.7;}

/* REPRODUCTOR EMBED */
.player-wrap{overflow:hidden;transition:max-height .3s ease, padding .3s ease;max-height:0;padding:0 12px;}
.player-wrap.visible{max-height:80px;padding:0 12px 10px;}
.player-inner{border-radius:10px;overflow:hidden;background:#000;position:relative;}
.player-inner iframe{display:block;width:100%;height:60px;border:none;}
/* Capa para ocultar la zona de vídeo y dejar solo los controles */
.player-overlay{position:absolute;top:0;left:0;right:0;height:20px;background:#000;pointer-events:none;}
.player-loading{display:flex;align-items:center;justify-content:center;gap:8px;height:60px;font-size:12px;color:var(--muted);}
.mini-spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:#667EEA;border-radius:50%;animation:spin .7s linear infinite;}

/* ESTADOS */
.estado{text-align:center;padding:60px 24px;color:var(--muted);}
.estado-emoji{font-size:44px;display:block;margin-bottom:16px;}
.estado h2{font-family:'Syne',sans-serif;font-size:18px;color:var(--text);margin-bottom:8px;}
.estado p{font-size:13px;line-height:1.6;max-width:260px;margin:0 auto;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:#667EEA;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:white;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;pointer-events:none;font-family:'Inter',sans-serif;}
#toast.visible{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:480px){header,.filtros,main{max-width:480px;margin-left:auto;margin-right:auto;}}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="logo">nanana</div>
      <div class="logo-sub">Radio 3 · playlist diaria</div>
    </div>
    <div class="header-right">
      <div class="meta-badge" id="meta-info">—</div>
      <button class="config-btn" onclick="toggleConfig()" title="Configuración">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="config-panel">
    <div class="config-label">URL del Google Apps Script</div>
    <input id="api-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">
    <button class="btn-guardar-config" onclick="guardarConfig()">Guardar y conectar</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="buscar" type="search" placeholder="Buscar artista o canción…" autocomplete="off" autocorrect="off">
  </div>
</header>

<div class="filtros">
  <button class="pill activo" onclick="setFiltro('todas',this)">Todas</button>
  <button class="pill" onclick="setFiltro('hoy',this)">Hoy</button>
  <button class="pill" onclick="setFiltro('pendientes',this)">Por escuchar</button>
  <button class="pill" onclick="setFiltro('guardadas',this)">Guardadas ♥</button>
</div>

<main id="main"></main>
<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────
const YT_API_KEY = 'AIzaSyA7zQHywXxMH6wXxne0D7FfaWeOgXcZcTI';
const CONFIG_KEY = 'nanana_api_url';
const GUARDADAS_KEY = 'nanana_guardadas';

const DIA_GRADIENTS = [
  'linear-gradient(135deg,#FF6B6B,#FF8E53)',
  'linear-gradient(135deg,#667EEA,#764BA2)',
  'linear-gradient(135deg,#F093FB,#F5576C)',
  'linear-gradient(135deg,#4FACFE,#00F2FE)',
  'linear-gradient(135deg,#43E97B,#38F9D7)',
  'linear-gradient(135deg,#FA709A,#FEE140)',
  'linear-gradient(135deg,#A18CD1,#FBC2EB)',
];

// ── ESTADO ────────────────────────────────────────────
let datos = {};
let guardadas = {};
let filtroActivo = 'todas';
let busquedaActiva = '';
let reproduciendo = null; // id de la card que está reproduciendo

// ── CONFIG UI ─────────────────────────────────────────
function getApiUrl(){ return localStorage.getItem(CONFIG_KEY)||''; }
function toggleConfig(){
  const p=document.getElementById('config-panel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible')) document.getElementById('api-url').value=getApiUrl();
}
function guardarConfig(){
  localStorage.setItem(CONFIG_KEY,document.getElementById('api-url').value.trim());
  toggleConfig(); cargarDatos();
}

// ── GUARDADAS ─────────────────────────────────────────
function cargarGuardadas(){
  try{ guardadas=JSON.parse(localStorage.getItem(GUARDADAS_KEY)||'{}'); }
  catch{ guardadas={}; }
}
function persistirGuardadas(){ localStorage.setItem(GUARDADAS_KEY,JSON.stringify(guardadas)); }
function clave(a,t){ return a+'||'+t; }

// ── CARGA DATOS ───────────────────────────────────────
async function cargarDatos(){
  const apiUrl=getApiUrl();
  const main=document.getElementById('main');
  if(!apiUrl){
    main.innerHTML=`<div class="estado"><span class="estado-emoji">⚙️</span><h2>Conecta tu script</h2><p>Toca ⚙️ arriba y pega la URL de tu Google Apps Script.</p></div>`;
    document.getElementById('meta-info').textContent='sin conectar';
    return;
  }
  main.innerHTML=`<div class="estado"><div class="spinner"></div><p>Cargando playlist…</p></div>`;
  try{
    const resp=await fetch(apiUrl+'?ts='+Date.now());
    const json=await resp.json();
    if(!json.ok) throw new Error();
    datos=json.datos||{};
    Object.keys(datos).forEach(f=>{
      datos[f]=datos[f].map(c=>({...c,guardada:guardadas[clave(c.artista,c.titulo)]||c.guardada}));
    });
    actualizarMeta(); renderizar();
  }catch{
    if(!Object.keys(datos).length) datos=demoData();
    document.getElementById('meta-info').textContent='modo demo';
    renderizar();
  }
}

function demoData(){
  const hoy=new Date().toISOString().split('T')[0];
  const ayer=new Date(Date.now()-86400000).toISOString().split('T')[0];
  const antes=new Date(Date.now()-172800000).toISOString().split('T')[0];
  return{
    [hoy]:[
      {artista:'Mitski',titulo:'My Love Mine All Mine',guardada:false},
      {artista:'Barry Can\'t Swim',titulo:'Kimbara',guardada:false},
      {artista:'Turnstile',titulo:'LIGHT DESIGN',guardada:true},
      {artista:'Charli xcx',titulo:'360',guardada:false},
      {artista:'Four Tet',titulo:'Into Dust (Still Falling)',guardada:false},
      {artista:'Courtney Barnett',titulo:'Another Beautiful Day',guardada:false},
    ],
    [ayer]:[
      {artista:'Beach House',titulo:'Somewhere Tonight',guardada:true},
      {artista:'Polo & Pan',titulo:'Petite Etoile',guardada:false},
      {artista:'Nilüfer Yanya',titulo:'Kneel',guardada:false},
      {artista:'Caroline Polachek',titulo:'On The Beach',guardada:false},
    ],
    [antes]:[
      {artista:'Soulwax',titulo:'Perfect We Are Not',guardada:false},
      {artista:'Lori Meyers',titulo:'En lo total',guardada:true},
      {artista:'Cala Vento',titulo:'Estoy Enamorado de Ti',guardada:false},
    ],
  };
}

function actualizarMeta(){
  const total=Object.values(datos).reduce((s,a)=>s+a.length,0);
  const dias=Object.keys(datos).length;
  document.getElementById('meta-info').textContent=`${total} canciones · ${dias} días`;
}

// ── RENDER ────────────────────────────────────────────
function renderizar(){
  const main=document.getElementById('main');
  const q=busquedaActiva.toLowerCase();
  const hoy=new Date().toISOString().split('T')[0];

  const grupos=Object.keys(datos).sort((a,b)=>b.localeCompare(a)).map(fecha=>{
    let canciones=datos[fecha];
    if(q) canciones=canciones.filter(c=>c.artista.toLowerCase().includes(q)||c.titulo.toLowerCase().includes(q));
    if(filtroActivo==='hoy'&&fecha!==hoy) return null;
    if(filtroActivo==='guardadas') canciones=canciones.filter(c=>guardadas[clave(c.artista,c.titulo)]);
    if(filtroActivo==='pendientes') canciones=canciones.filter(c=>!guardadas[clave(c.artista,c.titulo)]);
    if(!canciones.length) return null;
    return{fecha,canciones};
  }).filter(Boolean);

  if(!grupos.length){
    main.innerHTML=`<div class="estado"><span class="estado-emoji">🎵</span><h2>Nada por aquí</h2><p>${q?`Sin resultados para "${busquedaActiva}"`:'No hay canciones en esta sección.'}</p></div>`;
    return;
  }

  main.innerHTML=grupos.map(({fecha,canciones},gi)=>{
    const esHoy=fecha===hoy;
    const di=diaIndex(fecha);
    const grad=DIA_GRADIENTS[di];
    const nPend=canciones.filter(c=>!guardadas[clave(c.artista,c.titulo)]).length;
    const colapsado=!esHoy; // hoy expandido, resto colapsado

    return `<div class="grupo-fecha${colapsado?' colapsado':''}" id="g-${fecha}">
      <div class="fecha-header" onclick="toggleGrupo('${fecha}')">
        <div class="fecha-banda" style="background:${grad}"></div>
        <div class="fecha-info">
          <div class="fecha-dia">${esHoy?'Hoy':formatFecha(fecha)}</div>
          <div class="fecha-secundaria">${fecha}</div>
        </div>
        <div class="fecha-derecha">
          ${nPend>0&&filtroActivo!=='guardadas'?`<span class="badge-pendientes" style="background:${grad}">${nPend}</span>`:''}
          <span class="fecha-count">${canciones.length}</span>
          <svg class="fecha-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="lista-canciones">
        ${canciones.map((c,i)=>renderCancion(c,i+1,fecha,di,grad)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderCancion(c,num,fecha,di,grad){
  const k=clave(c.artista,c.titulo);
  const estaGuardada=guardadas[k]||c.guardada;
  const ytMusicUrl=`https://music.youtube.com/search?q=${encodeURIComponent(c.artista+' '+c.titulo)}`;
  const id=`c-${fecha}-${num}`;

  return `
  <div class="cancion${estaGuardada?' guardada':''}" id="${id}">
    <div class="cancion-main">
      <div class="cancion-num" style="background:${grad}">${num}</div>
      <div class="cancion-info">
        <div class="cancion-titulo">${esc(c.titulo)}</div>
        <div class="cancion-artista">${esc(c.artista)}</div>
      </div>
      <div class="cancion-actions">
        <button class="btn-play" id="play-${id}"
          style="background:${grad}"
          onclick="togglePlayer('${id}','${esc(c.artista).replace(/'/g,"\\'")}','${esc(c.titulo).replace(/'/g,"\\'")}',this)"
          title="Escuchar preview">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button class="btn-heart${estaGuardada?' guardado':''}" id="heart-${id}"
          onclick="toggleGuardar('${esc(c.artista).replace(/'/g,"\\'")}','${esc(c.titulo).replace(/'/g,"\\'")}','${id}')">
          <svg width="14" height="14" viewBox="0 0 24 24"
            fill="${estaGuardada?'#43E97B':'none'}"
            stroke="${estaGuardada?'#43E97B':'#8a8a8a'}"
            stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
        <a class="btn-ytmusic" href="${ytMusicUrl}" target="_blank">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.7a3 3 0 0 0-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.6A3 3 0 0 0 .5 6.7 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.3 3 3 0 0 0 2.1 2.1C4.5 20 12 20 12 20s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.3zM9.8 15.5V8.5l6.2 3.5-6.2 3.5z"/></svg>
          YT Music
        </a>
      </div>
    </div>
    <div class="player-wrap" id="pw-${id}">
      <div class="player-inner" id="pi-${id}"></div>
    </div>
  </div>`;
}

// ── REPRODUCTOR ───────────────────────────────────────
async function togglePlayer(id, artista, titulo, btn){
  const pw=document.getElementById('pw-'+id);
  const pi=document.getElementById('pi-'+id);
  const card=document.getElementById(id);

  // Si ya está reproduciendo esta canción → cerrar
  if(reproduciendo===id){
    pw.classList.remove('visible');
    pi.innerHTML='';
    card.classList.remove('reproduciendo');
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>';
    reproduciendo=null;
    return;
  }

  // Cerrar el reproductor anterior si existe
  if(reproduciendo){
    const prevPw=document.getElementById('pw-'+reproduciendo);
    const prevPi=document.getElementById('pi-'+reproduciendo);
    const prevCard=document.getElementById(reproduciendo);
    const prevBtn=document.getElementById('play-'+reproduciendo);
    if(prevPw) prevPw.classList.remove('visible');
    if(prevPi) prevPi.innerHTML='';
    if(prevCard) prevCard.classList.remove('reproduciendo');
    if(prevBtn) prevBtn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>';
  }

  // Mostrar loading
  reproduciendo=id;
  card.classList.add('reproduciendo');
  pw.classList.add('visible');
  pi.innerHTML='<div class="player-loading"><div class="mini-spinner"></div><span>Buscando en YouTube…</span></div>';
  btn.classList.add('loading');

  try {
    const videoId = await buscarEnYouTube(artista, titulo);
    if(!videoId) throw new Error('No encontrado');

    pi.innerHTML=`<iframe
      src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&cc_load_policy=0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>`;

    btn.classList.remove('loading');
    btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';

  } catch(e){
    pw.classList.remove('visible');
    pi.innerHTML='';
    card.classList.remove('reproduciendo');
    btn.classList.remove('loading');
    btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>';
    reproduciendo=null;
    mostrarToast('No encontrado en YouTube');
  }
}

async function buscarEnYouTube(artista, titulo){
  const q=encodeURIComponent(artista+' '+titulo+' official audio');
  const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`;
  const resp=await fetch(url);
  const json=await resp.json();
  if(json.items&&json.items.length>0){
    return json.items[0].id.videoId;
  }
  return null;
}

// ── GUARDAR ───────────────────────────────────────────
function toggleGuardar(artista, titulo, id){
  const k=clave(artista,titulo);
  guardadas[k]=!guardadas[k];
  persistirGuardadas();
  const card=document.getElementById(id);
  const btn=document.getElementById('heart-'+id);
  if(card) card.classList.toggle('guardada',guardadas[k]);
  if(btn){
    btn.classList.toggle('guardado',guardadas[k]);
    const svg=btn.querySelector('svg');
    svg.setAttribute('fill',guardadas[k]?'#43E97B':'none');
    svg.setAttribute('stroke',guardadas[k]?'#43E97B':'#8a8a8a');
  }
  mostrarToast(guardadas[k]?'♥ Guardada':'Eliminada de guardadas');
  sincronizar(artista,titulo,guardadas[k]);
}

async function sincronizar(artista,titulo,guardada){
  const url=getApiUrl(); if(!url) return;
  try{ await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion:'guardar',artista,titulo,guardada})}); }catch{}
}

function toggleGrupo(fecha){
  document.getElementById('g-'+fecha).classList.toggle('colapsado');
}

function mostrarToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('visible');
  setTimeout(()=>t.classList.remove('visible'),2200);
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const DIAS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function formatFecha(iso){
  const[y,m,d]=iso.split('-').map(Number);
  const f=new Date(y,m-1,d);
  return`${DIAS[f.getDay()]} ${d} ${MESES[m-1]}`;
}

function diaIndex(iso){
  const[y,m,d]=iso.split('-').map(Number);
  return new Date(y,m-1,d).getDay();
}
