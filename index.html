<script>
// ... (mantiene las variables globales anteriores igual)

// ── PLAYER (CORREGIDO)
async function play(i){
  if(i < 0 || i >= cola.length) return;
  idx = i;
  paused = false;
  now = cola[i];
  
  const ck_ = k(now.a, now.t);
  if(!mc[ck_]) await getMeta(now.a, now.t);
  
  updMP();
  updFP();
  $('mp').classList.add('on');
  
  // Llamamos a setup para inicializar los handlers y luego a upd para refrescar los botones
  setupMediaSession();
  updMediaSession(); 
  
  try {
    const vid = await ytSearch(now.a, now.t);
    if(!vid) throw 0;
    loadVideo(vid);
  } catch {
    toast('No encontrado en YouTube');
    next();
  }
  render();
}

// ── MEDIA SESSION API (CORREGIDO)
function setupMediaSession(){
  if(!('mediaSession' in navigator)) return;
  
  // Acciones fijas
  navigator.mediaSession.setActionHandler('play', () => { if(paused) togglePP(); });
  navigator.mediaSession.setActionHandler('pause', () => { if(!paused) togglePP(); });
  navigator.mediaSession.setActionHandler('stop', () => closePlayer());
  
  // Dejamos los botones de track configurados aquí, o los refrescamos en updMediaSession
  navigator.mediaSession.setActionHandler('previoustrack', () => prev());
  navigator.mediaSession.setActionHandler('nexttrack', () => next());
}

function updMediaSession(){
  if(!('mediaSession' in navigator) || !now) return;
  
  const cm = mc[k(now.a, now.t)] || {};
  
  // Actualizamos metadatos para que el SO sepa qué canción suena
  navigator.mediaSession.metadata = new MediaMetadata({
    title: now.t,
    artist: now.a,
    album: cm.album || 'nanana · Radio 3',
    artwork: cm.img ? [
      {src: cm.img, sizes: '512x512', type: 'image/jpeg'},
      {src: cm.img, sizes: '256x256', type: 'image/jpeg'},
    ] : [{src: '/nanana/icon-512.png', sizes: '512x512', type: 'image/png'}]
  });

  navigator.mediaSession.playbackState = paused ? 'paused' : 'playing';

  // Habilitamos o deshabilitamos los botones según la posición en la lista
  navigator.mediaSession.setActionHandler('previoustrack', idx > 0 ? () => prev() : null);
  navigator.mediaSession.setActionHandler('nexttrack', idx < cola.length - 1 ? () => next() : null);
}

// ... (resto de tus funciones: togglePP, closePlayer, etc.)

function onPlayerStateChange(e){
  if(e.data === 1){
    paused = false;
    dur = ytPlayer.getDuration() || 0;
    startProg();
    const PA = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    $('mp-ico').innerHTML = PA; $('fp-ico').innerHTML = PA;
    updMediaSession(); // Refrescamos el estado al empezar a reproducir
  }
  if(e.data === 2){
    paused = true;
    const P = '<polygon points="5,3 19,12 5,21"/>';
    $('mp-ico').innerHTML = P; $('fp-ico').innerHTML = P;
    if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
  }
  if(e.data === 0){ next(); }
}
// ...
</script>
