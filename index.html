<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<body>

<header>
  <div class="header-top">
    <div>
      <div class="logo">nanana</div>
      <div class="logo-sub">con Leyre Guerrero en Radio 3</div>
    </div>
    <button class="btn-cfg" onclick="toggleCfg()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Ajustes
    </button>
  </div>
</header>

<div id="cfg">
  <div class="cfg-l">URL del Google Apps Script</div>
  <input id="api-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">
  <button class="btn-save" onclick="saveCfg()">Guardar y conectar</button>
</div>

<div class="sw">
  <svg class="si" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input id="buscar" type="search" placeholder="Artista, canción, año de lanzamiento…" autocomplete="off" autocorrect="off">
</div>

<div class="tabs">
  <button class="tab on" onclick="setTab('hoy',this)">Hoy</button>
  <button class="tab" onclick="setTab('programas',this)">Programas</button>
  <button class="tab" onclick="setTab('canciones',this)">Canciones</button>
  <button class="tab" onclick="setTab('favoritos',this)">Favoritos</button>
</div>

<main id="main"></main>

<!-- MINI PLAYER CLARO -->
<div id="mp">
  <div class="mp-row" onclick="openFP()">
    <div class="mp-art" id="mp-art">🎵</div>
    <div class="mp-nfo">
      <div class="mp-tit" id="mp-tit">—</div>
      <div class="mp-art_" id="mp-art_">—</div>
    </div>
    <div class="mp-ctrls">
      <button class="mpc hrt" id="mp-hrt" onclick="event.stopPropagation();toggleSaveNow()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="mp-hrt-svg"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="mpc" onclick="event.stopPropagation();prev()">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
      <button class="mpc pri" onclick="event.stopPropagation();togglePP()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="mp-ico"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="mpc" onclick="event.stopPropagation();next()">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
      <a class="mpc ytm" id="mp-ytl" href="#" target="_blank" onclick="event.stopPropagation()" title="Abrir en YouTube Music">
        <!-- YouTube Music icon SVG -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
      </a>
      <button class="mp-x" onclick="event.stopPropagation();closePlayer()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
  <div>
    <div class="mp-bar" id="mp-bar" onmousedown="startSeek(event,'mp-bar')" ontouchstart="startSeek(event,'mp-bar')">
      <div class="mp-bar-fill" id="mp-bf"></div>
    </div>
    <div class="mp-times">
      <span class="mp-t" id="mp-tc">0:00</span>
      <span class="mp-t" id="mp-tt">—</span>
    </div>
  </div>
</div>

<!-- FULLSCREEN -->
<div id="fp">
  <!-- TOP: minimizar izq | guardar + YT Music der -->
  <div class="fp-top">
    <div class="fp-left">
      <button class="fp-down" onclick="closeFP()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <span class="fp-label">Reproduciendo</span>
    </div>
    <div class="fp-right">
      <button class="fp-hrt-btn" id="fp-hrt" onclick="toggleSaveNow()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="fp-hrt-svg"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <a class="fp-ytm-btn" id="fp-ytl" href="#" target="_blank" onclick="event.stopPropagation()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
        YT Music
      </a>
    </div>
  </div>

  <div class="fp-art-w">
    <div class="fp-art" id="fp-art"><span class="fp-art-ph">🎵</span></div>
  </div>

  <div class="fp-nfo">
    <div class="fp-tit" id="fp-tit">—</div>
    <div class="fp-art_" id="fp-art_">—</div>
    <div class="fp-meta" id="fp-meta"></div>
    <div class="fp-chips" id="fp-chips"></div>
  </div>

  <div class="fp-prog-w">
    <div class="fp-btrack" id="fp-bar" onmousedown="startSeek(event,'fp-bar')" ontouchstart="startSeek(event,'fp-bar')">
      <div class="fp-bfill" id="fp-bf"></div>
    </div>
    <div class="fp-times">
      <span class="fp-t" id="fp-tc">0:00</span>
      <span class="fp-t" id="fp-tt">—</span>
    </div>
  </div>

  <div class="fp-ctrls">
    <button class="fpc" onclick="prev()">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
    </button>
    <button class="fpc pri" onclick="togglePP()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white" id="fp-ico"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button class="fpc" onclick="next()">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div class="fp-lyr">
    <div class="lyr-ey">Letra</div>
    <div id="fp-lyr-txt"><span class="lyr-mut">Toca play para cargar la letra</span></div>
  </div>

  <div class="fp-next">
    <div class="fp-next-ey" id="fp-next-ey">A continuación</div>
    <div id="fp-next-list"></div>
  </div>
</div>

<div id="toast"></div>
<iframe id="ytf" allow="autoplay; encrypted-media" src="about:blank"></iframe>

<script>
// ── KEYS
const YTK='AIzaSyA7zQHywXxMH6wXxne0D7FfaWeOgXcZcTI';
const LFK='196f73e700628c03e1c2f4b9d8b26c25';
const CK='nanana_url',GK='nanana_g',MK='nanana_m';

// ── STATE
let data={},saved={},mc={};
let tab='hoy',q='';
let cola=[],idx=-1,paused=false;
let cur=0,dur=0,prog_iv=null;
let now=null;

// ── HELPERS
const $=id=>document.getElementById(id);
const $$=s=>Array.from(document.querySelectorAll(s));
const getUrl=()=>localStorage.getItem(CK)||'';
const k=(a,t)=>a+'||'+t;
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const iso=d=>d.toISOString().split('T')[0];
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const MFS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function amigable(s){
  const[y,m,d]=s.split('-').map(Number);
  if(s===iso(new Date()))return'Hoy';
  if(s===iso(new Date(Date.now()-864e5)))return'Ayer';
  return`${d} de ${MFS[m-1]} de ${y}`;
}
function amigableCorto(s){
  const[y,m,d]=s.split('-').map(Number);
  if(s===iso(new Date()))return'Hoy';
  if(s===iso(new Date(Date.now()-864e5)))return'Ayer';
  return`${d} de ${MFS[m-1]}`;
}

// ── CONFIG
function toggleCfg(){const p=$('cfg');p.classList.toggle('on');if(p.classList.contains('on'))$('api-url').value=getUrl();}
function saveCfg(){localStorage.setItem(CK,$('api-url').value.trim());toggleCfg();load();}

// ── PERSIST
function loadSaved(){try{saved=JSON.parse(localStorage.getItem(GK)||'{}')}catch{saved={}}}
function saveSaved(){localStorage.setItem(GK,JSON.stringify(saved))}
function loadMC(){try{mc=JSON.parse(localStorage.getItem(MK)||'{}')}catch{mc={}}}
function saveMC(){localStorage.setItem(MK,JSON.stringify(mc))}

// ── SEARCH & TABS
$$('#buscar')[0].addEventListener('input',e=>{q=e.target.value.trim();render();});
function setTab(t,btn){tab=t;$$('.tab').forEach(x=>x.classList.remove('on'));btn.classList.add('on');render();}

// ── LOAD
async function load(){
  const url=getUrl(),m=$('main');
  if(!url){m.innerHTML=ev('⚙️','Conecta tu script','Toca Ajustes y pega la URL de tu Google Apps Script.');return;}
  m.innerHTML='<div class="ev"><div class="spin"></div><p>Cargando…</p></div>';
  try{
    const r=await fetch(url+'?ts='+Date.now());
    const j=await r.json();
    if(!j.ok)throw 0;
    data={};
    Object.keys(j.datos||{}).forEach(f=>{
      data[f]=(j.datos[f]||[]).map(c=>({a:c.a||c.artista||'',t:c.t||c.titulo||'',guardada:c.guardada||false}));
    });
    render();
  }catch{
    if(!Object.keys(data).length)data=demo();
    render();
  }
}

function demo(){
  const h=iso(new Date()),ay=iso(new Date(Date.now()-864e5)),d2=iso(new Date(Date.now()-1728e5)),d3=iso(new Date(Date.now()-2592e5));
  return{
    [h]:[{a:'Sylvan Esso',t:'Coffee'},{a:'Portishead',t:'Chase the tear'},{a:'Alvvays',t:'Very Online Guy'},{a:'Lorde',t:'Royals'},{a:'New Order',t:'Krafty'},{a:'Charli xcx',t:'Von dutch'},{a:'Beach House',t:'Somewhere Tonight'},{a:'Caroline Polachek',t:'On The Beach'}],
    [ay]:[{a:'Mitski',t:'My Love Mine All Mine'},{a:'Phoebe Bridgers',t:'Lost Boys'},{a:'Dhéd',t:'Lucky'},{a:'Four Tet',t:'Into Dust'}],
    [d2]:[{a:'Gazella',t:'Sol menor'},{a:'Nabihah Iqbal',t:'This World'},{a:'Joy Division',t:'Transmission'}],
    [d3]:[{a:'Nu Genea',t:'Tienaté'},{a:'Turnstile',t:'LIGHT DESIGN'}],
  };
}

function render(){
  if(tab==='hoy')renderHoy();
  else if(tab==='programas')renderProgramas();
  else if(tab==='canciones')renderCanciones();
  else renderFav();
}

// ── COLLAGE HELPERS
function getImgs(fecha,max=4){return(data[fecha]||[]).map(c=>mc[k(c.a,c.t)]?.img||'').filter(Boolean).slice(0,max);}

function makeCollage(imgs){
  const f=imgs.filter(Boolean).slice(0,4),n=f.length;
  if(!n)return`<div class="cg n1"><div class="cc" style="font-size:80px">🎵</div></div>`;
  const cell=src=>`<div class="cc">${src?`<img src="${src}" loading="lazy" onerror="this.style.display='none'">`:'🎵'}</div>`;
  let cells='';
  if(n===1)cells=cell(f[0]);
  else if(n===2)cells=f.map(cell).join('');
  else if(n===3)cells=`<div class="cc sp2">${f[0]?`<img src="${f[0]}" loading="lazy" onerror="this.style.display='none'">`:'🎵'}</div>`+f.slice(1).map(cell).join('');
  else cells=f.map(cell).join('');
  return`<div class="cg n${Math.min(n,4)}">${cells}</div>`;
}

function makeRecCollage(imgs){
  const f=imgs.filter(Boolean).slice(0,4),n=f.length;
  if(!n)return`<div class="rc n1"><div class="rc-cell">🎵</div></div>`;
  const cell=src=>`<div class="rc-cell">${src?`<img src="${src}" loading="lazy" onerror="this.style.display='none'">`:'🎵'}</div>`;
  return`<div class="rc n${Math.min(n,4)}">${f.map(cell).join('')}</div>`;
}

// ── HOY
function renderHoy(){
  const m=$('main');
  const fechas=Object.keys(data).sort((a,b)=>b.localeCompare(a));
  if(!fechas.length){m.innerHTML=ev('🎵','Sin datos','');return;}
  const hoy=fechas[0];
  const cans=filtQ(data[hoy]||[]);
  if(!cans.length){m.innerHTML=ev('🎵','Sin resultados','');return;}
  cola=cans.map(c=>({a:c.a,t:c.t}));
  const p=cans[0];
  const hoyImgs=getImgs(hoy);

  // Guardadas para scroll horizontal
  const guardadasList=[];
  const vis=new Set();
  Object.keys(data).sort((a,b)=>b.localeCompare(a)).forEach(f=>{
    (data[f]||[]).forEach(c=>{const ck_=k(c.a,c.t);if(saved[ck_]&&!vis.has(ck_)){vis.add(ck_);guardadasList.push({a:c.a,t:c.t});}});
  });

  m.innerHTML=`
    <div class="collage" onclick="play(0)">
      ${makeCollage(hoyImgs)}
      <div class="c-ov"></div>
      <div class="c-top">
        <div class="c-chip">Emisión · ${amigableCorto(hoy)}</div>
        <div class="c-tracks">${cans.length} pistas</div>
      </div>
      <div class="c-bot">
        <div>
          <div class="c-lbl">Abriendo el programa</div>
          <div class="c-tit">${esc(p.t)}</div>
          <div class="c-art">${esc(p.a)}</div>
        </div>
        <button class="c-play" onclick="event.stopPropagation();play(0)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
      </div>
    </div>

    ${fechas.length>1?`
    <div class="sh"><div class="sl">Programas recientes</div><div class="sc">${fechas.length-1}</div></div>
    <div class="rscroll">
      ${fechas.slice(1,9).map(f=>{
        const imgs=getImgs(f),cnt=(data[f]||[]).length;
        return`<div class="ritem" onclick="irPrograma('${f}')">
          ${makeRecCollage(imgs)}
          <div class="r-fecha">${amigableCorto(f)}</div>
          <div class="r-cnt">${cnt} canciones</div>
        </div>`;
      }).join('')}
    </div>`:``}

    ${guardadasList.length?`
    <div class="sh"><div class="sl">Canciones guardadas</div><div class="sc">${guardadasList.length}</div></div>
    <div class="gscroll">
      ${guardadasList.slice(0,12).map((c,i)=>{
        const cm=mc[k(c.a,c.t)]||{};
        return`<div class="gitem" onclick="playGlobal('${esc(c.a).replace(/'/g,"\\'")}','${esc(c.t).replace(/'/g,"\\'")}')">
          <div class="gi-art">
            ${cm.img?`<img src="${cm.img}" loading="lazy" onerror="this.style.display='none'">`:'🎵'}
            <div class="gi-heart"><svg width="12" height="12" viewBox="0 0 24 24" fill="#16a34a"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
          </div>
          <div class="gi-tit">${esc(c.t)}</div>
          <div class="gi-art_">${esc(c.a)}</div>
        </div>`;
      }).join('')}
    </div>`:``}
  `;
  // Cargar meta en background
  cans.slice(0,16).forEach(c=>{if(!mc[k(c.a,c.t)])getMeta(c.a,c.t).then(()=>{if(tab==='hoy')renderHoy();});});
}

function irPrograma(f){
  $$('.tab')[1].click();
  setTimeout(()=>{const el=$('g-'+f);if(el){el.classList.remove('col');el.querySelector('.dbody').style.display='';el.scrollIntoView({behavior:'smooth'});}},300);
}

function playGlobal(a,t){
  // Buscar en cola global o crear cola de favoritos
  const vis=new Set();let all=[];
  Object.keys(data).sort((a_,b)=>b.localeCompare(a_)).forEach(f=>{
    (data[f]||[]).forEach(c=>{const ck_=k(c.a,c.t);if(saved[ck_]&&!vis.has(ck_)){vis.add(ck_);all.push({a:c.a,t:c.t});}});
  });
  cola=all;
  const i=all.findIndex(c=>c.a===a&&c.t===t);
  play(i>=0?i:0);
}

// ── PROGRAMAS
function renderProgramas(){
  const m=$('main');
  const fechas=Object.keys(data).sort((a,b)=>b.localeCompare(a));
  if(!fechas.length){m.innerHTML=ev('🎵','Sin datos','');return;}
  cola=[];
  fechas.forEach(f=>(data[f]||[]).forEach(c=>cola.push({a:c.a,t:c.t})));

  const porMes={};
  fechas.forEach(f=>{const mk_=f.substring(0,7);if(!porMes[mk_])porMes[mk_]=[];porMes[mk_].push(f);});
  const mesActual=iso(new Date()).substring(0,7);
  const MESES_N=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const hoyF=iso(new Date());

  m.innerHTML=Object.keys(porMes).sort((a,b)=>b.localeCompare(a)).map(mk_=>{
    const[y,mm]=mk_.split('-');
    const esActual=mk_===mesActual;
    const col=!esActual&&!q;
    const dias=porMes[mk_];
    const totalC=dias.reduce((s,f)=>s+filtQ(data[f]||[]).length,0);
    if(q&&totalC===0)return'';
    return`<div class="mg${col?' col':''}" id="mg-${mk_}">
      <div class="mh" onclick="toggleMes('${mk_}')">
        <div>
          <div class="mt${esActual?' act':''}">${MESES_N[parseInt(mm)-1]} ${y}</div>
          <div class="ms">${dias.length} emisiones · ${totalC} canciones</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <svg class="mchev" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="mbody" style="${col?'display:none':''}">
        ${dias.map(f=>{
          const cans=filtQ(data[f]||[]);
          if(!cans.length)return'';
          const colD=f!==hoyF&&!q;
          return`<div class="dg${colD?' col':''}" id="g-${f}">
            <div class="dh" onclick="toggleDia('${f}')">
              <div>
                <div class="dt">${amigable(f)}</div>
                <div class="ds">${cans.length} canciones</div>
              </div>

// ── META: MusicBrainz → Last.fm → Deezer → iTunes
async function getMeta(a,t){
  const ck_=k(a,t);
  if(mc[ck_])return mc[ck_];
  let r={album:'',date:'',dateiso:'',img:''};
  // 1. MusicBrainz
  try{
    const u=`https://musicbrainz.org/ws/2/recording/?query=recording:${encodeURIComponent('"'+t+'"')}+AND+artist:${encodeURIComponent('"'+a+'"')}&limit=3&fmt=json`;
    const res=await fetch(u,{headers:{'User-Agent':'NananaApp/2.0 (nanana@radio3.es)'}});
    if(res.ok){
      const j=await res.json();
      for(const rec of(j.recordings||[])){
        const rel=rec.releases?.[0],d=rel?.date||rec.date||'';
        if(d){r.album=rel?.title||'';r.dateiso=d;r.date=fmtD(d);break;}
      }
    }
  }catch{}
  // 2. Last.fm
  try{
    const res=await fetch(`https://ws.audioscrobbler.com/2.0/?method=track.getInfo&api_key=${LFK}&artist=${encodeURIComponent(a)}&track=${encodeURIComponent(t)}&format=json`);
    if(res.ok){
      const j=await res.json(),tr=j.track;
      if(tr){
        if(!r.album&&tr.album?.title)r.album=tr.album.title;
        const imgs=tr.album?.image||[];
        const imgU=(imgs.find(i=>i.size==='extralarge')||imgs.find(i=>i.size==='large')||{})['#text']||'';
        if(imgU&&!imgU.includes('2a96cbd8b46e442fc41c2b86b821562f'))r.img=imgU;
        if(!r.dateiso&&tr.album?.mbid){
          try{const res2=await fetch(`https://musicbrainz.org/ws/2/release/${tr.album.mbid}?fmt=json`,{headers:{'User-Agent':'NananaApp/2.0'}});if(res2.ok){const j2=await res2.json();if(j2.date){r.dateiso=j2.date;r.date=fmtD(j2.date);}}}catch{}
        }
      }
    }
  }catch{}
  // 3. Deezer
  if(!r.img||!r.dateiso){
    try{
      const res=await fetch(`https://api.deezer.com/search/track?q=${encodeURIComponent(a+' '+t)}&limit=1&output=json`);
      if(res.ok){
        const j=await res.json(),tr=j.data?.[0];
        if(tr){
          if(!r.img&&tr.album?.cover_xl)r.img=tr.album.cover_xl;
          else if(!r.img&&tr.album?.cover_big)r.img=tr.album.cover_big;
          if(!r.album&&tr.album?.title)r.album=tr.album.title;
          if(!r.dateiso&&tr.album?.release_date){r.dateiso=tr.album.release_date;r.date=fmtD(r.dateiso);}
        }
      }
    }catch{}
  }
  // 4. iTunes
  if(!r.img||!r.dateiso){
    try{
      const res=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(a+' '+t)}&media=music&limit=1`);
      if(res.ok){
        const j=await res.json(),item=j.results?.[0];
        if(item){
          if(!r.img)r.img=(item.artworkUrl100||'').replace('100x100bb','600x600bb');
          if(!r.album&&item.collectionName)r.album=item.collectionName;
          if(!r.dateiso&&item.releaseDate){r.dateiso=item.releaseDate.substring(0,10);r.date=fmtD(r.dateiso);}
        }
      }
    }catch{}
  }
  mc[ck_]=r;saveMC();return r;
}

function fmtD(iso_){
  if(!iso_)return'';
  const p=iso_.split('-'),M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  if(p.length>=3&&p[1]&&p[1]!=='00'&&p[2]&&p[2]!=='00')return`${parseInt(p[2])} ${M[parseInt(p[1])-1]} ${p[0]}`;
  if(p.length>=2&&p[1]&&p[1]!=='00')return`${M[parseInt(p[1])-1]} ${p[0]}`;
  return p[0]||'';
}

// ── LETRAS: lrclib → lyrics.ovh
async function loadLyrics(a,t){
  const el=$('fp-lyr-txt');

  try{
    const r=await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(a+' '+t)}&limit=1`);
    if(r.ok){const j=await r.json();if(j[0]?.plainLyrics){el.innerHTML=`<div class="lyr-txt">${esc(j[0].plainLyrics.trim())}</div>`;return;}}
  }catch{}
  try{
    const r=await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(a)}&track_name=${encodeURIComponent(t)}`);
    if(r.ok){const j=await r.json();if(j?.plainLyrics){el.innerHTML=`<div class="lyr-txt">${esc(j.plainLyrics.trim())}</div>`;return;}}
  }catch{}

async function ytSearch(a,t){
  const qe=encodeURIComponent(a+' '+t+' official audio');

}

// Swipe para cerrar fullscreen
function initSwipeDown(){
  const fp=$('fp');
  let startY=0,startScroll=0;
  const onStart=e=>{startY=e.touches[0].clientY;startScroll=fp.scrollTop;};
  const onMove=e=>{
    if(fp.scrollTop>10)return; // solo si está arriba del todo
    const dy=e.touches[0].clientY-startY;
    if(dy>80){closeFP();fp.removeEventListener('touchstart',onStart);fp.removeEventListener('touchmove',onMove);}
  };
  fp.addEventListener('touchstart',onStart,{passive:true});
  fp.addEventListener('touchmove',onMove,{passive:true});
}

// ── PROGRESO
function startProg(){clearInterval(prog_iv);cur=0;dur=0;updProg();prog_iv=setInterval(()=>{if(!paused){cur+=1;updProg();}},1000);}
function updProg(){
  const pct=dur>0?Math.min(100,cur/dur*100):0;
  $('mp-bf').style.width=pct+'%';$('fp-bf').style.width=pct+'%';
  const tc=ft(cur),tt=dur>0?ft(dur):'—';
  $('mp-tc').textContent=tc;$('mp-tt').textContent=tt;
  $('fp-tc').textContent=tc;$('fp-tt').textContent=tt;
}
function startSeek(e,barId){
  e.stopPropagation();
  const bar=$(barId);
  function doSeek(ev){
    const touch=ev.touches?ev.touches[0]:ev;
    const rect=bar.getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,(touch.clientX-rect.left)/rect.width));
    if(dur>0){cur=Math.floor(pct*dur);updProg();try{$('ytf').contentWindow?.postMessage(`{"event":"command","func":"seekTo","args":[${cur},true]}`,'*');}catch{}}
  }
  doSeek(e);
  const up=()=>{document.removeEventListener('mousemove',doSeek);document.removeEventListener('touchmove',doSeek);document.removeEventListener('mouseup',up);document.removeEventListener('touchend',up);};
  document.addEventListener('mousemove',doSeek,{passive:true});
  document.addEventListener('touchmove',doSeek,{passive:true});
  document.addEventListener('mouseup',up);document.addEventListener('touchend',up);
}
function ft(s){const m=Math.floor(s/60),sc=Math.floor(s%60);return`${m}:${sc.toString().padStart(2,'0')}`;}

window.addEventListener('message',e=>{
  try{
    const d=typeof e.data==='string'?JSON.parse(e.data):e.data;
    if(d.event==='infoDelivery'){if(d.info?.duration>0)dur=d.info.duration;if(d.info?.currentTime)cur=d.info.currentTime;}
    if(d.event==='onStateChange'&&d.info===0)next();
    if(d.event==='onStateChange'&&d.info===1)paused=false;
    if(d.event==='onStateChange'&&d.info===2)paused=true;
  }catch{}
});

// ── GUARDAR
function toggleSave(a,t){
  const ck_=k(a,t);saved[ck_]=!saved[ck_];saveSaved();
  toast(saved[ck_]?'♥ Guardada':'Eliminada de favoritos');
  sync(a,t,saved[ck_]);updHearts();render();
}
function toggleSaveNow(){if(now)toggleSave(now.a,now.t);}
async function sync(a,t,g){const url=getUrl();if(!url)return;try{await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion:'guardar',artista:a,titulo:t,guardada:g})});}catch{}}

// ── HELPERS
function filtQ(arr){if(!q)return arr;const lq=q.toLowerCase();return arr.filter(c=>c.a.toLowerCase().includes(lq)||c.t.toLowerCase().includes(lq));}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}
function ev(e,h,p){return`<div class="ev"><span class="ee">${e}</span><h2>${h}</h2><p>${p}</p></div>`;}

// ── SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/nanana/sw.js').catch(()=>{});
}

// ── INIT
loadSaved();loadMC();load();
document.addEventListener('visibilitychange',()=>{if(!document.hidden)load();});
</script>
