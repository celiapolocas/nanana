<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAFAF8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>nanana</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8;
  --white: #FFFFFF;
  --text: #1a1a1a;
  --muted: #8a8a8a;
  --border: #E8E8E8;
  --surface: #F2F2F0;
  --red: #E8000D;
  --red-light: #FFF0F0;
  --red-border: #FFD0D2;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --green-border: #86efac;
  --r: 12px;
  --font: 'Inter', -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ─────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,250,248,0.95);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  padding-top: calc(12px + env(safe-area-inset-top));
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo {
  font-size: 22px; font-weight: 800; letter-spacing: -1.5px;
  color: var(--red); line-height: 1;
}
.logo-sub { font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 6px; }
.meta-badge { font-size: 11px; color: var(--muted); background: var(--surface); border-radius: 20px; padding: 3px 9px; font-weight: 500; }
.icon-btn { background: var(--surface); border: none; border-radius: 9px; color: var(--muted); cursor: pointer; padding: 7px; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }

/* ── CONFIG ─────────────────────────────────────────── */
#config-panel { display: none; background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; margin-bottom: 10px; }
#config-panel.visible { display: block; }
.config-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
#api-url { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; padding: 8px 10px; outline: none; margin-bottom: 8px; font-family: var(--font); }
#api-url:focus { border-color: var(--red); }
.btn-config-save { width: 100%; background: var(--red); border: none; border-radius: 8px; color: white; font-size: 13px; font-weight: 700; padding: 9px; cursor: pointer; font-family: var(--font); }

/* ── BÚSQUEDA ────────────────────────────────────────── */
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
#buscar { width: 100%; background: var(--surface); border: 1.5px solid transparent; border-radius: 10px; color: var(--text); font-size: 14px; padding: 9px 12px 9px 34px; outline: none; transition: border-color .2s, background .2s; font-family: var(--font); }
#buscar:focus { border-color: var(--red); background: var(--white); }
#buscar::placeholder { color: var(--muted); }

/* ── NAV TABS ────────────────────────────────────────── */
.nav-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
.nav-tab { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 12px; font-weight: 600; padding: 10px 4px; cursor: pointer; font-family: var(--font); transition: color .15s, border-color .15s; -webkit-tap-highlight-color: transparent; letter-spacing: 0.2px; }
.nav-tab.activo { color: var(--red); border-bottom-color: var(--red); }

/* ── FILTROS ─────────────────────────────────────────── */
.filtros { display: flex; gap: 6px; padding: 8px 16px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.filtros::-webkit-scrollbar { display: none; }
.pill { flex-shrink: 0; background: var(--white); border: 1.5px solid var(--border); border-radius: 20px; color: var(--muted); font-size: 11px; font-weight: 600; padding: 5px 12px; cursor: pointer; transition: all .15s; white-space: nowrap; -webkit-tap-highlight-color: transparent; font-family: var(--font); }
.pill.activo { background: var(--red); border-color: var(--red); color: white; }

/* ── MAIN ────────────────────────────────────────────── */
main { padding-bottom: 20px; }

/* ── GRUPO FECHA (tab Programa) ──────────────────────── */
.grupo-fecha { margin-bottom: 2px; }
.fecha-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.fecha-banda { width: 4px; height: 34px; border-radius: 4px; background: var(--red); flex-shrink: 0; }
.fecha-info { flex: 1; min-width: 0; }
.fecha-dia { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; line-height: 1.1; }
.fecha-dia.hoy { color: var(--red); }
.fecha-secundaria { font-size: 10px; color: var(--muted); margin-top: 1px; font-weight: 500; }
.fecha-derecha { display: flex; align-items: center; gap: 6px; }
.fecha-count { font-size: 11px; color: var(--muted); background: var(--surface); border-radius: 10px; padding: 3px 8px; font-weight: 600; }
.badge-nuevas { font-size: 10px; font-weight: 700; color: white; background: var(--red); border-radius: 10px; padding: 2px 7px; }
.fecha-chevron { color: var(--muted); transition: transform .2s; flex-shrink: 0; }
.grupo-fecha.colapsado .fecha-chevron { transform: rotate(-90deg); }
.grupo-fecha.colapsado .lista-canciones { display: none; }
.lista-canciones { padding: 0 12px 4px; }

/* ── CARD CANCIÓN ────────────────────────────────────── */
.cancion { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r); margin-bottom: 5px; overflow: hidden; transition: border-color .15s; }
.cancion.guardada { border-color: var(--green-border); background: var(--green-light); }
.cancion.reproduciendo { border-color: var(--red); }
.cancion-main { display: flex; align-items: center; gap: 9px; padding: 10px 11px; }
.cancion-num { width: 24px; height: 24px; border-radius: 7px; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }
.cancion-num.playing-indicator { background: var(--red); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.cancion-info { flex: 1; min-width: 0; }
.cancion-titulo { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.cancion-artista { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; font-weight: 500; }
.cancion-meta { font-size: 10px; color: var(--red); margin-top: 2px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cancion-acciones { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.btn-play { width: 30px; height: 30px; border-radius: 50%; background: var(--red); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: transform .1s, opacity .15s; flex-shrink: 0; }
.btn-play:active { transform: scale(0.9); }
.btn-play.loading { opacity: 0.6; }
.btn-heart { width: 30px; height: 30px; border-radius: 50%; background: var(--surface); border: 1.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: all .15s; flex-shrink: 0; }
.btn-heart:active { transform: scale(0.88); }
.btn-heart.guardado { background: var(--green-light); border-color: var(--green-border); }
.btn-ytmusic { height: 30px; border-radius: 15px; background: var(--red-light); border: 1.5px solid var(--red-border); color: var(--red); font-size: 10px; font-weight: 700; padding: 0 9px; cursor: pointer; display: flex; align-items: center; gap: 3px; white-space: nowrap; -webkit-tap-highlight-color: transparent; text-decoration: none; font-family: var(--font); flex-shrink: 0; }
.btn-ytmusic:active { opacity: .7; }

/* ── REPRODUCTOR EMBED ───────────────────────────────── */
.player-wrap { overflow: hidden; max-height: 0; transition: max-height .3s ease, padding .3s ease; padding: 0 11px; }
.player-wrap.visible { max-height: 72px; padding: 0 11px 10px; }
.player-inner { border-radius: 8px; overflow: hidden; background: #000; }
.player-inner iframe { display: block; width: 100%; height: 60px; border: none; }
.player-loading { display: flex; align-items: center; justify-content: center; gap: 8px; height: 60px; font-size: 11px; color: var(--muted); font-weight: 500; }
.mini-spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SECCIÓN NOVEDADES ───────────────────────────────── */
.novedades-group { margin-bottom: 2px; }
.novedades-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.novedades-year { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.novedades-year.current { color: var(--red); }
.novedades-count { font-size: 11px; color: var(--muted); background: var(--surface); border-radius: 10px; padding: 3px 8px; font-weight: 600; }
.novedades-chevron { color: var(--muted); transition: transform .2s; }
.novedades-group.colapsado .novedades-chevron { transform: rotate(-90deg); }
.novedades-group.colapsado .novedades-lista { display: none; }
.novedades-lista { padding: 0 12px 4px; }

.novedad-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--r); margin-bottom: 5px; overflow: hidden; }
.novedad-card.guardada { border-color: var(--green-border); background: var(--green-light); }
.novedad-card.reproduciendo { border-color: var(--red); }
.novedad-main { display: flex; align-items: center; gap: 9px; padding: 10px 11px; }
.novedad-fecha-badge { flex-shrink: 0; text-align: center; background: var(--red); border-radius: 8px; padding: 4px 7px; min-width: 44px; }
.novedad-fecha-badge.unknown { background: var(--surface); }
.novedad-fecha-dia { font-size: 14px; font-weight: 800; color: white; line-height: 1; }
.novedad-fecha-badge.unknown .novedad-fecha-dia { color: var(--muted); font-size: 11px; font-weight: 600; }
.novedad-fecha-mes { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 0.5px; }
.novedad-info { flex: 1; min-width: 0; }
.novedad-titulo { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.novedad-artista { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; font-weight: 500; }
.novedad-album { font-size: 10px; color: var(--red); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.novedad-acciones { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

/* ── ESTADOS ─────────────────────────────────────────── */
.estado { text-align: center; padding: 50px 24px; color: var(--muted); }
.estado-emoji { font-size: 40px; display: block; margin-bottom: 14px; }
.estado h2 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -0.3px; }
.estado p { font-size: 13px; line-height: 1.6; max-width: 260px; margin: 0 auto; font-weight: 500; }
.spinner { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }

/* ── MINI PLAYER BARRA FIJA ──────────────────────────── */
#mini-player {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(250,250,248,0.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 10px 16px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  display: none;
}
#mini-player.visible { display: block; }
.mini-player-inner { display: flex; align-items: center; gap: 10px; }
.mini-player-info { flex: 1; min-width: 0; }
.mini-player-titulo { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
.mini-player-artista { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.mini-player-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.ctrl-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--surface); border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: background .15s; }
.ctrl-btn:active { background: var(--border); }
.ctrl-btn.play-main { background: var(--red); color: white; width: 36px; height: 36px; }
.ctrl-close { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; -webkit-tap-highlight-color: transparent; }

/* ── TOAST ───────────────────────────────────────────── */
#toast { position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: white; font-size: 12px; font-weight: 600; padding: 9px 18px; border-radius: 20px; opacity: 0; transition: all .25s cubic-bezier(.34,1.56,.64,1); z-index: 999; white-space: nowrap; pointer-events: none; font-family: var(--font); }
#toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SEPARADOR ───────────────────────────────────────── */
.sep { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 14px 16px 4px; }

@media(min-width:480px){ header,.nav-tabs,.filtros,main,#mini-player{ max-width:480px; margin-left:auto; margin-right:auto; } }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="logo">nanana</div>
      <div class="logo-sub">Radio 3 · playlist diaria</div>
    </div>
    <div class="header-right">
      <div class="meta-badge" id="meta-info">—</div>
      <button class="icon-btn" onclick="toggleConfig()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="config-panel">
    <div class="config-label">URL del Google Apps Script</div>
    <input id="api-url" type="url" placeholder="https://script.google.com/macros/s/…/exec">
    <button class="btn-config-save" onclick="guardarConfig()">Guardar y conectar</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="buscar" type="search" placeholder="Artista, canción, año de lanzamiento…" autocomplete="off" autocorrect="off">
  </div>
</header>

<div class="nav-tabs">
  <button class="nav-tab activo" onclick="setTab('programa',this)">Programa</button>
  <button class="nav-tab" onclick="setTab('novedades',this)">Novedades</button>
  <button class="nav-tab" onclick="setTab('guardadas',this)">Guardadas</button>
</div>

<div class="filtros" id="filtros-programa">
  <button class="pill activo" onclick="setFiltro('todas',this)">Todas</button>
  <button class="pill" onclick="setFiltro('hoy',this)">Hoy</button>
  <button class="pill" onclick="setFiltro('guardadas-p',this)">Guardadas ♥</button>
</div>

<main id="main"></main>

<!-- Mini player fijo -->
<div id="mini-player">
  <div class="mini-player-inner">
    <div class="mini-player-info">
      <div class="mini-player-titulo" id="mp-titulo">—</div>
      <div class="mini-player-artista" id="mp-artista">—</div>
    </div>
    <div class="mini-player-controls">
      <button class="ctrl-btn" onclick="prevCancion()" title="Anterior">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="ctrl-btn play-main" id="mp-playpause" onclick="togglePlayPause()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" id="mp-icon">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn" onclick="nextCancion()" title="Siguiente">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <button class="ctrl-close" onclick="cerrarPlayer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <!-- iframe oculto para reproducción continua -->
  <div style="height:0;overflow:hidden;"><iframe id="yt-iframe" allow="autoplay; encrypted-media" style="width:1px;height:1px;border:none;"></iframe></div>
</div>

<div id="toast"></div>

<script>
const YT_API_KEY = 'AIzaSyA7zQHywXxMH6wXxne0D7FfaWeOgXcZcTI';
const CONFIG_KEY = 'nanana_api_url';
const GUARDADAS_KEY = 'nanana_guardadas';
const META_KEY = 'nanana_meta'; // cache de MusicBrainz

// ── ESTADO ────────────────────────────────────────────
let datos = {};           // { fecha: [{artista,titulo,guardada}] }
let guardadas = {};       // { "artista||titulo": true }
let metaCache = {};       // { "artista||titulo": {album, fecha_lanzamiento} }
let filtroActivo = 'todas';
let tabActivo = 'programa';
let busquedaActiva = '';

// Cola de reproducción
let cola = [];            // array de {artista,titulo}
let colaIndex = -1;       // índice actual en la cola
let isPaused = false;

// ── CONFIG ────────────────────────────────────────────
function getApiUrl(){ return localStorage.getItem(CONFIG_KEY)||''; }
function toggleConfig(){
  const p=document.getElementById('config-panel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible')) document.getElementById('api-url').value=getApiUrl();
}
function guardarConfig(){
  localStorage.setItem(CONFIG_KEY,document.getElementById('api-url').value.trim());
  toggleConfig(); cargarDatos();
}

// ── PERSISTENCIA ──────────────────────────────────────
function cargarGuardadas(){
  try{ guardadas=JSON.parse(localStorage.getItem(GUARDADAS_KEY)||'{}'); }catch{ guardadas={}; }
}
function persistirGuardadas(){ localStorage.setItem(GUARDADAS_KEY,JSON.stringify(guardadas)); }
function cargarMetaCache(){
  try{ metaCache=JSON.parse(localStorage.getItem(META_KEY)||'{}'); }catch{ metaCache={}; }
}
function persistirMeta(){ localStorage.setItem(META_KEY,JSON.stringify(metaCache)); }
function clave(a,t){ return a+'||'+t; }

// ── CARGA DATOS ───────────────────────────────────────
async function cargarDatos(){
  const apiUrl=getApiUrl();
  const main=document.getElementById('main');
  if(!apiUrl){
    main.innerHTML=`<div class="estado"><span class="estado-emoji">⚙️</span><h2>Conecta tu script</h2><p>Toca ⚙️ y pega la URL de tu Google Apps Script.</p></div>`;
    document.getElementById('meta-info').textContent='sin conectar';
    return;
  }
  main.innerHTML=`<div class="estado"><div class="spinner"></div><p>Cargando playlist…</p></div>`;
  try{
    const resp=await fetch(apiUrl+'?ts='+Date.now());
    const json=await resp.json();
    if(!json.ok) throw new Error();
    datos=json.datos||{};
    Object.keys(datos).forEach(f=>{
      datos[f]=datos[f].map(c=>({...c,guardada:guardadas[clave(c.artista,c.titulo)]||c.guardada}));
    });
    actualizarMeta();
    renderizar();
  }catch{
    if(!Object.keys(datos).length) datos=demoData();
    document.getElementById('meta-info').textContent='modo demo';
    renderizar();
  }
}

async function renderNovedades(){
  const main=document.getElementById('main');
  const q=busquedaActiva.toLowerCase();

  // Aplanar todas las canciones
  let todasCanciones=[];
  Object.keys(datos).forEach(fecha=>{
    datos[fecha].forEach(c=>{
      todasCanciones.push({...c,fechaPrograma:fecha});
    });
  });

  // Deduplicar por artista+titulo
  const vistas=new Set();
  todasCanciones=todasCanciones.filter(c=>{
    const k=clave(c.artista,c.titulo);
    if(vistas.has(k)) return false;
    vistas.add(k); return true;
  });

  // Aplicar búsqueda
  if(q) todasCanciones=todasCanciones.filter(c=>matchBusqueda(c,q));

  if(!todasCanciones.length){ main.innerHTML=estadoVacio(q); return; }

  main.innerHTML=`<div class="estado"><div class="spinner"></div><p>Cargando metadatos…</p></div>`;

  // Cargar MusicBrainz para las que no tenemos en cache
  const sinMeta=todasCanciones.filter(c=>!metaCache[clave(c.artista,c.titulo)]);
  // Cargar en lotes de 5 para no saturar la API
  for(let i=0;i<Math.min(sinMeta.length,30);i+=5){
    const lote=sinMeta.slice(i,i+5);
    await Promise.all(lote.map(c=>cargarMeta(c.artista,c.titulo)));
    await sleep(300);
  }

  // Ordenar por fecha de lanzamiento (más reciente primero)
  todasCanciones.sort((a,b)=>{
    const ma=metaCache[clave(a.artista,a.titulo)];
    const mb=metaCache[clave(b.artista,b.titulo)];
    const fa=ma?.fecha_lanzamiento_iso||'0000-00-00';
    const fb=mb?.fecha_lanzamiento_iso||'0000-00-00';
    return fb.localeCompare(fa);
  });

  // Agrupar por año
  const porAnyo={};
  todasCanciones.forEach(c=>{
    const meta=metaCache[clave(c.artista,c.titulo)];
    const anyo=meta?.fecha_lanzamiento_iso?.substring(0,4)||'?';
    if(!porAnyo[anyo]) porAnyo[anyo]=[];
    porAnyo[anyo].push(c);
  });

  // Construir cola para novedades
  cola=todasCanciones.map(c=>({artista:c.artista,titulo:c.titulo}));

  const anyos=Object.keys(porAnyo).sort((a,b)=>b.localeCompare(a));
  const anyoActual=new Date().getFullYear().toString();

  main.innerHTML=anyos.map((anyo,gi)=>{
    const canciones=porAnyo[anyo];
    const colapsado=anyo!==anyoActual&&gi>0;
    return `<div class="novedades-group${colapsado?' colapsado':''}" id="ng-${anyo}">
      <div class="novedades-header" onclick="toggleNovedadGroup('${anyo}')">
        <div class="novedades-year${anyo===anyoActual?' current':''}">${anyo==='?'?'Fecha desconocida':anyo}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="novedades-count">${canciones.length}</span>
          <svg class="novedades-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="novedades-lista">
        ${canciones.map((c,i)=>{
          const colaIdx=cola.findIndex(x=>x.artista===c.artista&&x.titulo===c.titulo);
          return renderNovedad(c,colaIdx);
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── MUSICBRAINZ ───────────────────────────────────────
async function cargarMeta(artista,titulo){
  const k=clave(artista,titulo);
  if(metaCache[k]) return;
  try{
    const q=encodeURIComponent(`recording:"${titulo}" AND artist:"${artista}"`);
    const url=`https://musicbrainz.org/ws/2/recording/?query=${q}&limit=1&fmt=json`;
    const resp=await fetch(url,{headers:{'User-Agent':'NananaApp/1.0 (ceilapolocas@gmail.com)'}});
    if(!resp.ok) throw new Error();
    const json=await resp.json();
    if(!json.recordings||!json.recordings.length){ metaCache[k]={album:'',fecha_lanzamiento:'',fecha_lanzamiento_iso:''}; persistirMeta(); return; }
    const rec=json.recordings[0];
    const release=rec.releases?.[0];
    const album=release?.title||'';
    const fechaIso=release?.date||rec.date||'';
    const fechaDisplay=formatearFechaMB(fechaIso);
    metaCache[k]={album,fecha_lanzamiento:fechaDisplay,fecha_lanzamiento_iso:fechaIso};
    persistirMeta();
  }catch{
    metaCache[k]={album:'',fecha_lanzamiento:'',fecha_lanzamiento_iso:''};
  }
}

function formatearFechaMB(iso){
  if(!iso) return '';
  const partes=iso.split('-');
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  if(partes.length===3&&partes[1]&&partes[2]&&partes[1]!=='00'&&partes[2]!=='00'){
    return `${parseInt(partes[2])} ${meses[parseInt(partes[1])-1]} ${partes[0]}`;
  } else if(partes.length>=2&&partes[1]&&partes[1]!=='00'){
    return `${meses[parseInt(partes[1])-1]} ${partes[0]}`;
  } else if(partes[0]){
    return partes[0];
  }
  return '';
}

// ── REPRODUCTOR CONTINUO ──────────────────────────────
async function playDesdeIndice(idx){
  if(idx<0||idx>=cola.length) return;
  colaIndex=idx;
  isPaused=false;
  const c=cola[idx];
  await cargarYReproducir(c.artista,c.titulo);
  renderizar();
}

async function cargarYReproducir(artista,titulo){
  const mp=document.getElementById('mini-player');
  mp.classList.add('visible');
  document.getElementById('mp-titulo').textContent=titulo;
  document.getElementById('mp-artista').textContent=artista;
  actualizarIconoPlay();
  try{
    const videoId=await buscarEnYouTube(artista,titulo);
    if(!videoId) throw new Error();
    const iframe=document.getElementById('yt-iframe');
    iframe.src=`https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&enablejsapi=1`;
  }catch{
    mostrarToast('No encontrado en YouTube');
    nextCancion();
  }
}

async function buscarEnYouTube(artista,titulo){
  const q=encodeURIComponent(artista+' '+titulo+' audio');
  const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YT_API_KEY}`;
  const resp=await fetch(url);
  const json=await resp.json();
  return json.items?.[0]?.id?.videoId||null;
}

function togglePlayPause(){
  isPaused=!isPaused;
  const iframe=document.getElementById('yt-iframe');
  // Postmessage a YouTube para pause/play
  const msg=isPaused?'{"event":"command","func":"pauseVideo","args":""}':'{"event":"command","func":"playVideo","args":""}';
  iframe.contentWindow?.postMessage(msg,'*');
  actualizarIconoPlay();
  renderizar();
}

function actualizarIconoPlay(){
  const icon=document.getElementById('mp-icon');
  if(!icon) return;
  if(isPaused){
    icon.innerHTML='<polygon points="5,3 19,12 5,21"/>';
  } else {
    icon.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  }
}

function prevCancion(){
  if(colaIndex>0) playDesdeIndice(colaIndex-1);
}

function nextCancion(){
  if(colaIndex<cola.length-1) playDesdeIndice(colaIndex+1);
  else mostrarToast('Fin de la lista');
}

function cerrarPlayer(){
  const mp=document.getElementById('mini-player');
  mp.classList.remove('visible');
  document.getElementById('yt-iframe').src='';
  colaIndex=-1; isPaused=false;
  renderizar();
}

// Auto-next cuando termina el vídeo (via postMessage de YouTube)
window.addEventListener('message',e=>{
  try{
    const data=typeof e.data==='string'?JSON.parse(e.data):e.data;
    // Estado 0 = ended
    if(data.event==='onStateChange'&&data.info===0) nextCancion();
  }catch{}
});

function toggleGuardar(artista,titulo,id){
  const k=clave(artista,titulo);
  guardadas[k]=!guardadas[k];
  persistirGuardadas();
  mostrarToast(guardadas[k]?'♥ Guardada':'Eliminada de guardadas');
  sincronizar(artista,titulo,guardadas[k]);
  renderizar();
}

async function sincronizar(artista,titulo,guardada){
  const url=getApiUrl(); if(!url) return;
  try{ await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion:'guardar',artista,titulo,guardada})}); }catch{}
}

// ── HELPERS ───────────────────────────────────────────
function matchBusqueda(c,q){
  const meta=metaCache[clave(c.artista,c.titulo)];
  return c.artista.toLowerCase().includes(q)||
    c.titulo.toLowerCase().includes(q)||
    (meta?.fecha_lanzamiento_iso||'').includes(q)||
    (meta?.fecha_lanzamiento||'').toLowerCase().includes(q)||
    (meta?.album||'').toLowerCase().includes(q);
}

function toggleGrupo(fecha){
  document.getElementById('g-'+fecha).classList.toggle('colapsado');
}
function toggleNovedadGroup(anyo){
  document.getElementById('ng-'+anyo).classList.toggle('colapsado');
}

function mostrarToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('visible');
  setTimeout(()=>t.classList.remove('visible'),2200);
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const DIAS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function formatFecha(iso){
  const[y,m,d]=iso.split('-').map(Number);
  const f=new Date(y,m-1,d);
  return`${DIAS[f.getDay()]} ${d} ${MESES[m-1]}`;
}

function estadoVacio(q){
  return`<div class="estado"><span class="estado-emoji">🎵</span><h2>Nada por aquí</h2><p>${q?`Sin resultados para "${busquedaActiva}"`:'No hay canciones en esta sección.'}</p></div>`;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
